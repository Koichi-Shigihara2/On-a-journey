<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>TANUKI VALUATION - Stock Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    :root {
      --bg:#0a0d14; --sur:#111520; --sur2:#161c2d; --bdr:#1e2840;
      --acc:#3b82f6; --grn:#10b981; --red:#f43f5e; --amb:#f59e0b;
      --txt:#e2e8f0; --mut:#64748b;
      --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:14px;min-height:100vh;line-height:1.6}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:999}
    .shell{max-width:1000px;margin:0 auto;padding:0 20px 60px}

    header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg);z-index:100}
    .hdr-l{display:flex;align-items:center;gap:20px}
    .logo{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:.1em;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--txt)}
    .logo-text{display:flex;gap:3px}
    .logo-accent{color:var(--acc)}
    .logo-dot{width:7px;height:7px;background:var(--acc);border-radius:50%;animation:pdot 2s ease-in-out infinite}
    @keyframes pdot{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.4)}50%{box-shadow:0 0 0 5px rgba(59,130,246,0)}}
    .back-link{font-family:var(--mono);font-size:10px;color:var(--mut);text-decoration:none;display:flex;align-items:center;gap:4px}
    .back-link:hover{color:var(--acc)}
    .header-right{font-family:var(--mono);font-size:10px;color:var(--mut)}

    .hero{padding:36px 0 28px;border-bottom:1px solid var(--bdr)}
    .ticker-header{display:flex;align-items:baseline;gap:14px;margin-bottom:8px}
    .ticker-symbol{font-family:var(--mono);font-size:32px;font-weight:700}
    .ticker-sector{font-size:12px;color:var(--mut);background:var(--sur);padding:4px 12px;border-radius:4px}
    .company-name{font-size:14px;color:var(--mut);margin-bottom:20px}

    .value-display{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .value-box{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:22px}
    .value-box.primary{border-color:var(--acc);background:linear-gradient(135deg,var(--sur) 0%,var(--sur2) 100%)}
    .value-label{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    .value-main{font-family:var(--mono);font-size:38px;font-weight:700;color:var(--acc);text-shadow:0 0 24px rgba(59,130,246,.25)}
    .value-sub{font-family:var(--mono);font-size:13px;color:var(--mut);margin-top:6px}
    .upside-badge{display:inline-block;font-family:var(--mono);font-size:13px;font-weight:700;padding:5px 10px;border-radius:5px;margin-top:10px}
    .upside-badge.positive{background:rgba(16,185,129,.15);color:var(--grn)}
    .upside-badge.negative{background:rgba(244,63,94,.15);color:var(--red)}

    .calc-summary{margin-top:20px;background:var(--sur);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
    .calc-summary-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;transition:background .2s}
    .calc-summary-header:hover{background:var(--sur2)}
    .calc-summary-title{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--acc);display:flex;align-items:center;gap:8px}
    .calc-summary-toggle{font-size:10px;color:var(--mut);transition:transform .2s}
    .calc-summary.open .calc-summary-toggle{transform:rotate(180deg)}
    .calc-summary-body{display:none;padding:0 18px 18px;border-top:1px solid var(--bdr)}
    .calc-summary.open .calc-summary-body{display:block}

    .summary-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
    .summary-card{background:var(--sur2);border-radius:6px;padding:12px;text-align:center}
    .summary-card-label{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
    .summary-card-value{font-family:var(--mono);font-size:15px;font-weight:700}
    .summary-card-value.accent{color:var(--acc)}

    .summary-details{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .summary-detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--sur2);border-radius:5px}
    .summary-detail-label{font-size:11px;color:var(--mut)}
    .summary-detail-value{font-family:var(--mono);font-size:11px}

    .future-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}
    .future-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:14px;text-align:center}
    .future-year{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
    .future-value{font-family:var(--mono);font-size:18px;font-weight:700;margin-top:4px}

    .calc-section{margin-top:36px}
    .section-title{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--acc);letter-spacing:.15em;margin-bottom:16px;display:flex;align-items:center;gap:10px}
    .section-title::after{content:'';flex:1;height:1px;background:var(--bdr)}
    .calc-steps{display:flex;flex-direction:column;gap:2px}
    .calc-step{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
    .calc-step-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;transition:background .2s}
    .calc-step-header:hover{background:var(--sur2)}
    .calc-step-title{display:flex;align-items:center;gap:10px}
    .step-num{font-family:var(--mono);font-size:10px;color:var(--acc);background:rgba(59,130,246,.15);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .step-name{font-family:var(--mono);font-size:12px;font-weight:700}
    .step-result{font-family:var(--mono);font-size:13px;color:var(--txt)}
    .toggle-arrow{font-size:10px;color:var(--mut);transition:transform .2s}
    .calc-step.open .toggle-arrow{transform:rotate(180deg)}
    .calc-step-body{display:none;padding:16px;border-top:1px solid var(--bdr);background:var(--sur2)}
    .calc-step.open .calc-step-body{display:block}
    .formula-box{background:var(--sur);border:1px solid var(--bdr);border-radius:6px;padding:14px;margin-bottom:14px}
    .formula-box code{font-family:var(--mono);font-size:11px;color:var(--acc);display:block;margin-bottom:4px}
    .formula-desc{font-size:12px;color:var(--mut);margin-top:8px;line-height:1.6}
    .inputs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .input-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--sur);border-radius:5px}
    .input-label{font-size:11px;color:var(--mut)}
    .input-value{font-family:var(--mono);font-size:11px}

    .chart-container{margin-top:36px}
    #valuation-chart{width:100%;height:320px}

    .components-table{margin-top:36px}
    .data-table{width:100%;border-collapse:collapse;background:var(--sur);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
    .data-table th,.data-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--bdr)}
    .data-table th{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;background:var(--sur2)}
    .data-table tr:last-child td{border-bottom:none}
    .data-table .mono{font-family:var(--mono);font-size:12px}

    footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--bdr);text-align:center;font-size:11px;color:var(--mut)}
    footer a{color:var(--acc);text-decoration:none}

    @media(max-width:700px){
      .value-display{grid-template-columns:1fr}
      .summary-cards{grid-template-columns:repeat(2,1fr)}
      .summary-details{grid-template-columns:1fr}
      .inputs-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="hdr-l">
      <a href="index.html" class="logo">
        <span class="logo-dot"></span>
        <span class="logo-text">TANUKI<span class="logo-accent">VALUATION</span></span>
      </a>
      <a href="index.html" class="back-link">← 銘柄一覧</a>
    </div>
    <div class="header-right">Koichi式 v5.2 Phase 4</div>
  </header>
  <div id="main-content"><div style="text-align:center;padding:80px 0;color:var(--mut)">Loading...</div></div>
</div>
<script>
const SECTORS={TSLA:"EV/Energy",PLTR:"AI/Defense",SOFI:"Fintech",CELH:"Consumer",NVDA:"Semiconductor",AMD:"Semiconductor",APP:"AdTech",SOUN:"AI/Audio",RKLB:"Space",ONDS:"Semiconductor",MSFT:"Cloud/Software",AMZN:"E-Commerce/Cloud",FIG:"Fintech"};
const NAMES={TSLA:"Tesla, Inc.",PLTR:"Palantir Technologies",SOFI:"SoFi Technologies",CELH:"Celsius Holdings",NVDA:"NVIDIA Corporation",AMD:"Advanced Micro Devices",APP:"AppLovin Corporation",SOUN:"SoundHound AI",RKLB:"Rocket Lab USA",ONDS:"Ondas Holdings",MSFT:"Microsoft Corporation",AMZN:"Amazon.com, Inc.",FIG:"Simplify Asset Management"};

function getTickerFromUrl(){const p=new URLSearchParams(window.location.search);return(p.get('ticker')||'TSLA').toUpperCase()}
const fmt=v=>v?.toFixed(2)??'--';
const fmtPct=v=>v!=null?(v*100).toFixed(1)+'%':'--';
const fmtInt=v=>v!=null?v.toLocaleString():'--';
function fmtB(v){if(v==null||isNaN(v))return'--';const a=Math.abs(v);if(a>=1e12)return'$'+(v/1e12).toFixed(2)+'T';if(a>=1e9)return'$'+(v/1e9).toFixed(2)+'B';if(a>=1e6)return'$'+(v/1e6).toFixed(2)+'M';return'$'+v.toLocaleString()}

async function loadData(){
  const ticker=getTickerFromUrl();
  document.title=`${ticker} | TANUKI VALUATION`;
  try{
    const res=await fetch(`data/${ticker}/latest.json`);
    if(!res.ok)throw new Error("Data not found");
    const data=await res.json();
    renderDetail(ticker,data);
  }catch(e){
    document.getElementById('main-content').innerHTML=`<div class="hero"><div class="ticker-header"><div class="ticker-symbol">${ticker}</div><div class="ticker-sector">${SECTORS[ticker]||'Other'}</div></div><div class="company-name">${NAMES[ticker]||''}</div></div><div style="text-align:center;padding:60px 0;color:var(--mut)"><p>データが見つかりません。</p><p style="margin-top:12px"><a href="index.html" style="color:var(--acc)">銘柄一覧に戻る</a></p></div>`;
  }
}

function renderDetail(ticker,data){
  const ivps=data.intrinsic_value_per_share||0,v0=data.v0||0,alpha=data.alpha||0,futureValues=data.future_values||{},calcDate=data.calculation_date||'--',formula=data.formula||'Koichi式 v5.2',c=data.components||{};
  const currentPrice=c.current_price||0,fcfAvg=c.fcf_5yr_avg||0,roeAvg=c.roe_10yr_avg||c.roe_used||0,dilutedShares=c.diluted_shares||0,highGrowthRate=c.high_growth_rate_used||0.15,pvHigh=c.pv_high||0,pvTerminal=c.pv_terminal||0,latestRevenue=c.latest_revenue||0,rpo=c.rpo||0,rpoPV=c.rpo_pv||c.rpo_adjustment||0;
  const upside=currentPrice>0?((ivps-currentPrice)/currentPrice*100):0;
  const upsideClass=upside>=0?'positive':'negative';
  const upsideText=(upside>=0?'+':'')+upside.toFixed(1)+'%';
  const enterpriseValue=(v0+rpoPV)*(1+alpha);

  document.getElementById('main-content').innerHTML=`
    <div class="hero">
      <div class="ticker-header"><div class="ticker-symbol">${ticker}</div><div class="ticker-sector">${SECTORS[ticker]||'Other'}</div></div>
      <div class="company-name">${NAMES[ticker]||''}</div>
      <div class="value-display">
        <div class="value-box primary">
          <div class="value-label">本質的価値 (1株当り)</div>
          <div class="value-main">$${fmt(ivps)}</div>
          <div class="value-sub">企業価値：$${fmtInt(Math.round(enterpriseValue))}</div>
          <div class="upside-badge ${upsideClass}">${upsideText} vs 現在価格</div>
        </div>
        <div class="value-box">
          <div class="value-label">現在の市場価格</div>
          <div class="value-main" style="color:var(--txt)">$${fmt(currentPrice)}</div>
          <div class="value-sub">計算日：${calcDate}</div>
          <div class="value-sub">${formula}</div>
        </div>
      </div>
      <div class="calc-summary" id="calcSummary">
        <div class="calc-summary-header" onclick="toggleSummary()">
          <div class="calc-summary-title">📊 計算要素サマリー</div>
          <span class="calc-summary-toggle">▼</span>
        </div>
        <div class="calc-summary-body">
          <div class="summary-cards">
            <div class="summary-card"><div class="summary-card-label">FCF 5yr Avg</div><div class="summary-card-value">${fmtB(fcfAvg)}</div></div>
            <div class="summary-card"><div class="summary-card-label">ROE Avg</div><div class="summary-card-value">${fmtPct(roeAvg)}</div></div>
            <div class="summary-card"><div class="summary-card-label">Growth Rate</div><div class="summary-card-value">${fmtPct(highGrowthRate)}</div></div>
            <div class="summary-card"><div class="summary-card-label">α</div><div class="summary-card-value accent">${alpha.toFixed(3)}</div></div>
          </div>
          <div class="summary-details">
            <div class="summary-detail-row"><span class="summary-detail-label">希薄化後株式数</span><span class="summary-detail-value">${fmtInt(dilutedShares)}</span></div>
            <div class="summary-detail-row"><span class="summary-detail-label">直近売上高</span><span class="summary-detail-value">${fmtB(latestRevenue)}</span></div>
            <div class="summary-detail-row"><span class="summary-detail-label">V₀ (DCF)</span><span class="summary-detail-value">${fmtB(v0)}</span></div>
            <div class="summary-detail-row"><span class="summary-detail-label">PV (高成長期)</span><span class="summary-detail-value">${fmtB(pvHigh)}</span></div>
            <div class="summary-detail-row"><span class="summary-detail-label">PV (ターミナル)</span><span class="summary-detail-value">${fmtB(pvTerminal)}</span></div>
            ${rpo>0?`<div class="summary-detail-row"><span class="summary-detail-label">RPO → PV</span><span class="summary-detail-value">${fmtB(rpo)} → ${fmtB(rpoPV)}</span></div>`:''}
          </div>
        </div>
      </div>
    </div>
    <div class="future-grid">
      <div class="future-card"><div class="future-year">1年後予測</div><div class="future-value">${futureValues['1年後']?'$'+futureValues['1年後']:'--'}</div></div>
      <div class="future-card"><div class="future-year">2年後予測</div><div class="future-value">${futureValues['2年後']?'$'+futureValues['2年後']:'--'}</div></div>
      <div class="future-card"><div class="future-year">3年後予測</div><div class="future-value">${futureValues['3年後']?'$'+futureValues['3年後']:'--'}</div></div>
    </div>
    <div class="calc-section">
      <h2 class="section-title">CALCULATION BREAKDOWN</h2>
      <div class="calc-steps">
        <div class="calc-step"><div class="calc-step-header" onclick="toggleStep(this)"><div class="calc-step-title"><span class="step-num">1</span><span class="step-name">FCF 5年平均の算出</span></div><div style="display:flex;align-items:center;gap:16px"><span class="step-result">${fmtB(fcfAvg)}</span><span class="toggle-arrow">▼</span></div></div><div class="calc-step-body"><div class="formula-box"><code>FCF_avg = Σ(OCF - CapEx) / 5</code><p class="formula-desc">過去5年間の営業キャッシュフロー（OCF）から設備投資（CapEx）を差し引いたフリーキャッシュフローの平均値。FCFがマイナスの場合は売上高×8%をフロアとして適用。</p></div><div class="inputs-grid"><div class="input-item"><span class="input-label">FCF 5年平均</span><span class="input-value">${fmtB(fcfAvg)}</span></div><div class="input-item"><span class="input-label">直近売上高</span><span class="input-value">${fmtB(latestRevenue)}</span></div></div></div></div>
        <div class="calc-step"><div class="calc-step-header" onclick="toggleStep(this)"><div class="calc-step-title"><span class="step-num">2</span><span class="step-name">企業別高成長率（CAGR）</span></div><div style="display:flex;align-items:center;gap:16px"><span class="step-result">${fmtPct(highGrowthRate)}</span><span class="toggle-arrow">▼</span></div></div><div class="calc-step-body"><div class="formula-box"><code>CAGR = (FCF_最新 / FCF_開始)^(1/n) - 1</code><p class="formula-desc">過去のFCF実績から年平均成長率を算出。15%〜50%の範囲でクリップ。この成長率を高成長期（3年間）に適用。</p></div><div class="inputs-grid"><div class="input-item"><span class="input-label">高成長率</span><span class="input-value">${fmtPct(highGrowthRate)}</span></div><div class="input-item"><span class="input-label">高成長期間</span><span class="input-value">3年</span></div></div></div></div>
        <div class="calc-step"><div class="calc-step-header" onclick="toggleStep(this)"><div class="calc-step-title"><span class="step-num">3</span><span class="step-name">2段階DCF計算</span></div><div style="display:flex;align-items:center;gap:16px"><span class="step-result">${fmtB(v0)}</span><span class="toggle-arrow">▼</span></div></div><div class="calc-step-body"><div class="formula-box"><code>V₀ = Σ[FCF×(1+g)^t / (1+WACC)^t] + TV/(1+WACC)^n</code><p class="formula-desc">Phase 1（高成長期）：3年間、企業別CAGRで成長<br>Phase 2（ターミナル）：永続成長率3%でゴーイングコンサーン価値<br>WACC: 8.5%（成長期待を含まない固定値）</p></div><div class="inputs-grid"><div class="input-item"><span class="input-label">PV (高成長期)</span><span class="input-value">${fmtB(pvHigh)}</span></div><div class="input-item"><span class="input-label">PV (ターミナル)</span><span class="input-value">${fmtB(pvTerminal)}</span></div><div class="input-item"><span class="input-label">WACC</span><span class="input-value">8.5%</span></div><div class="input-item"><span class="input-label">ターミナル成長率</span><span class="input-value">3.0%</span></div></div></div></div>
        <div class="calc-step"><div class="calc-step-header" onclick="toggleStep(this)"><div class="calc-step-title"><span class="step-num">4</span><span class="step-name">α（成長期待プレミアム）</span></div><div style="display:flex;align-items:center;gap:16px"><span class="step-result">${alpha.toFixed(4)}</span><span class="toggle-arrow">▼</span></div></div><div class="calc-step-body"><div class="formula-box"><code>α = min(1.0, max(0, (g_個別 / WACC) × 0.7))</code><code>g_個別 = ROE_連続黒字平均 × 内部留保率(60%)</code><p class="formula-desc">直近連続黒字期間の平均ROEと内部留保率から個別成長期待を算出。WACCとの比率に0.7を乗じて過大評価を抑制。αは1.0でキャップ。</p></div><div class="inputs-grid"><div class="input-item"><span class="input-label">ROE (連続黒字平均)</span><span class="input-value">${fmtPct(roeAvg)}</span></div><div class="input-item"><span class="input-label">内部留保率</span><span class="input-value">60%</span></div><div class="input-item"><span class="input-label">g_個別</span><span class="input-value">${fmtPct(roeAvg*0.6)}</span></div><div class="input-item"><span class="input-label">α</span><span class="input-value">${alpha.toFixed(4)}</span></div></div></div></div>
        ${rpo>0?`<div class="calc-step"><div class="calc-step-header" onclick="toggleStep(this)"><div class="calc-step-title"><span class="step-num">5</span><span class="step-name">RPO補正</span></div><div style="display:flex;align-items:center;gap:16px"><span class="step-result">+${fmtB(rpoPV)}</span><span class="toggle-arrow">▼</span></div></div><div class="calc-step-body"><div class="formula-box"><code>RPO_PV = RPO / (1 + discount_rate)^1.5</code><p class="formula-desc">Remaining Performance Obligations（残存履行義務）を現在価値に割り引き。契約済み未認識売上を企業価値に加算。割引率15%、平均1.5年で回収と仮定。</p></div><div class="inputs-grid"><div class="input-item"><span class="input-label">RPO</span><span class="input-value">${fmtB(rpo)}</span></div><div class="input-item"><span class="input-label">割引率</span><span class="input-value">15%</span></div><div class="input-item"><span class="input-label">平均回収期間</span><span class="input-value">1.5年</span></div><div class="input-item"><span class="input-label">RPO現在価値</span><span class="input-value">${fmtB(rpoPV)}</span></div></div></div></div>`:''}
        <div class="calc-step"><div class="calc-step-header" onclick="toggleStep(this)"><div class="calc-step-title"><span class="step-num">${rpo>0?'6':'5'}</span><span class="step-name">本質的価値（P_t）算出</span></div><div style="display:flex;align-items:center;gap:16px"><span class="step-result">$${fmt(ivps)}</span><span class="toggle-arrow">▼</span></div></div><div class="calc-step-body"><div class="formula-box"><code>P_t = (V₀ + RPO_PV) × (1 + α)</code><code>1株当り = P_t / 希薄化後株式数</code><p class="formula-desc">DCFで算出した本質的企業価値にRPO現在価値を加算し、成長期待プレミアム(1+α)を乗じ、希薄化後株式数で除して1株当り本質価値を算出。</p></div><div class="inputs-grid"><div class="input-item"><span class="input-label">V₀（DCF価値）</span><span class="input-value">${fmtB(v0)}</span></div><div class="input-item"><span class="input-label">1 + α</span><span class="input-value">${(1+alpha).toFixed(4)}</span></div><div class="input-item"><span class="input-label">企業価値 P_t</span><span class="input-value">${fmtB(enterpriseValue)}</span></div><div class="input-item"><span class="input-label">希薄化後株式数</span><span class="input-value">${fmtInt(dilutedShares)}</span></div></div></div></div>
      </div>
    </div>
    <div class="chart-container"><h2 class="section-title">VALUATION COMPONENTS</h2><div id="valuation-chart"></div></div>
    <div class="components-table">
      <h2 class="section-title">RAW DATA</h2>
      <table class="data-table">
        <tr><th>項目</th><th>値</th><th>説明</th></tr>
        <tr><td>intrinsic_value_per_share</td><td class="mono">$${fmt(ivps)}</td><td>1株当り本質的価値</td></tr>
        <tr><td>v0</td><td class="mono">${fmtB(v0)}</td><td>DCF計算による企業価値</td></tr>
        <tr><td>alpha</td><td class="mono">${alpha.toFixed(4)}</td><td>成長期待プレミアム係数</td></tr>
        <tr><td>pv_high</td><td class="mono">${fmtB(pvHigh)}</td><td>高成長期PV</td></tr>
        <tr><td>pv_terminal</td><td class="mono">${fmtB(pvTerminal)}</td><td>ターミナルPV</td></tr>
        <tr><td>high_growth_rate</td><td class="mono">${fmtPct(highGrowthRate)}</td><td>企業別高成長率（CAGR）</td></tr>
        <tr><td>fcf_5yr_avg</td><td class="mono">${fmtB(fcfAvg)}</td><td>FCF 5年平均</td></tr>
        <tr><td>roe_avg</td><td class="mono">${fmtPct(roeAvg)}</td><td>ROE 連続黒字期間平均</td></tr>
        <tr><td>diluted_shares</td><td class="mono">${fmtInt(dilutedShares)}</td><td>希薄化後発行済株式数</td></tr>
        ${rpo>0?`<tr><td>rpo</td><td class="mono">${fmtB(rpo)}</td><td>Remaining Performance Obligations</td></tr><tr><td>rpo_pv</td><td class="mono">${fmtB(rpoPV)}</td><td>RPO現在価値</td></tr>`:''}
      </table>
    </div>
    <footer><p>計算日: ${calcDate} | ${formula}</p><p style="margin-top:8px">データソース: SEC EDGAR | <a href="index.html">銘柄一覧に戻る</a></p></footer>
  `;
  renderChart(pvHigh,pvTerminal,alpha,v0,rpoPV);
}

function toggleSummary(){document.getElementById('calcSummary').classList.toggle('open')}
function toggleStep(h){h.parentElement.classList.toggle('open')}

function renderChart(pvHigh,pvTerminal,alpha,v0,rpoPV){
  const hasRPO=rpoPV>0,totalV0=v0+rpoPV;
  const x=hasRPO?['PV (高成長期)','PV (ターミナル)','V₀','RPO PV','α Premium','本質的価値']:['PV (高成長期)','PV (ターミナル)','V₀','α Premium','本質的価値'];
  const y=hasRPO?[pvHigh,pvTerminal,0,rpoPV,totalV0*alpha,0]:[pvHigh,pvTerminal,0,v0*alpha,0];
  const measure=hasRPO?['relative','relative','total','relative','relative','total']:['relative','relative','total','relative','total'];
  const text=hasRPO?['$'+Math.round(pvHigh).toLocaleString(),'$'+Math.round(pvTerminal).toLocaleString(),'$'+Math.round(v0).toLocaleString(),'$'+Math.round(rpoPV).toLocaleString(),'$'+Math.round(totalV0*alpha).toLocaleString(),'$'+Math.round(totalV0*(1+alpha)).toLocaleString()]:['$'+Math.round(pvHigh).toLocaleString(),'$'+Math.round(pvTerminal).toLocaleString(),'$'+Math.round(v0).toLocaleString(),'$'+Math.round(v0*alpha).toLocaleString(),'$'+Math.round(v0*(1+alpha)).toLocaleString()];
  const data=[{type:'waterfall',orientation:'v',x:x,y:y,measure:measure,text:text,textposition:'outside',connector:{line:{color:'#1e2840'}},increasing:{marker:{color:'#10b981'}},decreasing:{marker:{color:'#f43f5e'}},totals:{marker:{color:'#3b82f6'}}}];
  const layout={paper_bgcolor:'#111520',plot_bgcolor:'#111520',font:{family:'Space Mono, monospace',color:'#64748b',size:11},margin:{t:40,b:60,l:60,r:40},showlegend:false,yaxis:{gridcolor:'#1e2840',tickformat:'$,.0f',title:{text:'企業価値 (USD)',font:{size:11}}},xaxis:{tickangle:-30}};
  Plotly.newPlot('valuation-chart',data,layout,{displayModeBar:false,responsive:true});
}

loadData();
</script>
</body>
</html>
