<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adjusted EPS Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    .spinner-border {
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .scrollable-adjustments {
      max-height: 600px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .scrollable-adjustments::-webkit-scrollbar {
      width: 8px;
    }
    .scrollable-adjustments::-webkit-scrollbar-track {
      background: #2d3748;
      border-radius: 4px;
    }
    .scrollable-adjustments::-webkit-scrollbar-thumb {
      background: #4a5568;
      border-radius: 4px;
    }
    .scrollable-adjustments::-webkit-scrollbar-thumb:hover {
      background: #718096;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6">
  <header class="fixed top-0 left-0 right-0 bg-gray-800 shadow z-10">
    <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold">Adjusted EPS Analyzer</h1>
      <div class="space-x-4">
        <a href="#" class="text-blue-400 hover:text-blue-300">ダッシュボード</a>
        <a href="#" class="text-blue-400 hover:text-blue-300">銘柄一覧</a>
        <a href="#" class="text-blue-400 hover:text-blue-300">設定</a>
      </div>
      <div class="flex items-center space-x-2">
        <input type="text" id="ticker-search" placeholder="ティッカー (例: NVDA)" 
               class="px-3 py-1 bg-gray-700 rounded text-white" value="TSLA">
        <button onclick="loadTicker()" class="bg-blue-600 px-4 py-1 rounded hover:bg-blue-700">
          検索
        </button>
      </div>
    </nav>
  </header>

  <main class="container mx-auto mt-24">
    <div id="loading" class="hidden text-center py-10">
      <div class="spinner-border inline-block w-8 h-8"></div>
      <p class="mt-2">データを読み込み中...</p>
    </div>

    <div id="error" class="hidden bg-red-900 text-white p-4 rounded-lg mb-6">
      <p>エラーが発生しました。 <button onclick="loadTicker()" class="underline">再試行</button></p>
    </div>

    <div id="content" class="hidden">
      <!-- 銘柄ヘッダー -->
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold" id="ticker-title">TSLA</h2>
        <div class="flex space-x-2">
          <span id="health-badge" class="px-3 py-1 rounded-full text-sm font-semibold bg-green-600" title="健全性: Good">Good</span>
          <span class="text-gray-400" id="last-updated"></span>
        </div>
      </div>

      <!-- メトリクスカード -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-gray-800 p-4 rounded-lg">
          <div class="text-gray-400 text-sm">GAAP EPS</div>
          <div class="text-2xl font-bold text-gray-300" id="gaap-eps">$0.00</div>
        </div>
        <div class="bg-gray-800 p-4 rounded-lg">
          <div class="text-gray-400 text-sm">Adjusted EPS</div>
          <div class="text-2xl font-bold text-green-400" id="adj-eps">$0.00</div>
        </div>
        <div class="bg-gray-800 p-4 rounded-lg">
          <div class="text-gray-400 text-sm">差分</div>
          <div class="text-2xl font-bold" id="diff">$0.00</div>
        </div>
        <div class="bg-gray-800 p-4 rounded-lg">
          <div class="text-gray-400 text-sm">YoY成長率</div>
          <div class="text-2xl font-bold" id="yoy">--</div>
        </div>
      </div>

      <!-- タブ -->
      <div class="border-b border-gray-700 mb-4">
        <ul class="flex flex-wrap -mb-px">
          <li class="mr-2">
            <a href="#" onclick="switchTab('quarterly')" class="inline-block p-4 border-b-2 border-blue-600 text-blue-600 font-semibold" id="tab-quarterly">四半期</a>
          </li>
          <li class="mr-2">
            <a href="#" onclick="switchTab('ttm')" class="inline-block p-4 border-b-2 border-transparent hover:text-gray-300" id="tab-ttm">TTM</a>
          </li>
        </ul>
      </div>

      <!-- 任意期間指定UI（日付ピッカー + プリセットボタン） -->
      <div class="bg-gray-800 p-4 rounded-lg mb-6">
        <div class="flex flex-wrap items-end gap-4 mb-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">開始日</label>
            <input type="date" id="start-date" class="bg-gray-700 text-white px-3 py-2 rounded border border-gray-600">
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">終了日</label>
            <input type="date" id="end-date" class="bg-gray-700 text-white px-3 py-2 rounded border border-gray-600">
          </div>
          <div>
            <button onclick="applyDateRange()" class="bg-blue-600 px-6 py-2 rounded hover:bg-blue-700">適用</button>
          </div>
        </div>
        
        <!-- プリセットボタン -->
        <div class="flex flex-wrap gap-2">
          <button onclick="setPreset('all')" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">全期間</button>
          <button onclick="setPreset('5y')" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">5年</button>
          <button onclick="setPreset('4y')" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">4年</button>
          <button onclick="setPreset('3y')" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">3年</button>
          <button onclick="setPreset('2y')" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">2年</button>
          <button onclick="setPreset('1y')" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">1年</button>
          <button onclick="resetDateRange()" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">リセット</button>
        </div>
      </div>

      <!-- チャート -->
      <div class="bg-gray-800 p-6 rounded-lg mb-8">
        <canvas id="eps-chart" height="300"></canvas>
      </div>

      <!-- AI分析（選択期間内の最新四半期） -->
      <div class="bg-gray-800 p-6 rounded-lg mb-8">
        <h3 class="text-xl font-semibold mb-4 flex items-center">
          AI分析（選択期間内の最新四半期）
          <span class="ml-2 text-sm bg-gray-700 px-2 py-1 rounded">Grok</span>
        </h3>
        <div id="ai-comment" class="prose prose-invert max-w-none">
          <!-- AIコメントが入る -->
        </div>
        <div id="ai-sources" class="mt-4 text-sm text-gray-400 border-t border-gray-700 pt-4">
          <!-- ソース表示 -->
        </div>
      </div>

      <!-- 調整内訳（全期間） -->
      <div class="bg-gray-800 p-6 rounded-lg mb-8">
        <h3 class="text-xl font-semibold mb-4">調整内訳（全期間）</h3>
        <div id="adjustments-accordion" class="scrollable-adjustments space-y-4 pr-2">
          <!-- JSで動的生成 -->
        </div>
      </div>
    </div>
  </main>

  <script>
    Chart.register(ChartDataLabels);

    let currentTicker = 'TSLA';
    let quarterlyData = null;
    let ttmData = null;
    let chart = null;
    let currentTab = 'quarterly';

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('hidden', !show);
    }

    async function loadTicker(ticker = null) {
      if (ticker) currentTicker = ticker;
      else currentTicker = document.getElementById('ticker-search').value.toUpperCase();

      showLoading(true);
      document.getElementById('content').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');

      try {
        // キャッシュ無効化オプション付きでフェッチ
        const qResp = await fetch(`data/${currentTicker}/quarterly.json`, { cache: 'no-store' });
        if (!qResp.ok) throw new Error('四半期データが見つかりません');
        quarterlyData = await qResp.json();
        console.log('Quarterly data loaded:', JSON.parse(JSON.stringify(quarterlyData)));

        try {
          const tResp = await fetch(`data/${currentTicker}/ttm.json`, { cache: 'no-store' });
          if (tResp.ok) ttmData = await tResp.json();
        } catch (e) {
          console.log('TTM data not found');
          ttmData = null;
        }

        updateHeader(quarterlyData);
        
        // 日付入力欄の初期値を設定（データの最小日付・最大日付）
        setInitialDateRange(quarterlyData.quarters);
        
        // 初期表示は全期間
        applyDateRange();

        document.getElementById('ticker-title').innerText = currentTicker;
        showLoading(false);
        document.getElementById('content').classList.remove('hidden');
        document.getElementById('error').classList.add('hidden');

        switchTab('quarterly');
      } catch (error) {
        console.error('Error:', error);
        showLoading(false);
        document.getElementById('error').classList.remove('hidden');
      }
    }

    function updateHeader(data) {
      document.getElementById('last-updated').innerText = 
        `最終更新: ${new Date(data.last_updated).toLocaleDateString('ja-JP')}`;
    }

    // データから最小日付と最大日付を取得し、inputにセット
    function setInitialDateRange(quarters) {
      if (!quarters || quarters.length === 0) return;
      const dates = quarters.map(q => q.filing_date).sort(); // 昇順
      const minDate = dates[0];
      const maxDate = dates[dates.length - 1];
      document.getElementById('start-date').value = minDate;
      document.getElementById('end-date').value = maxDate;
    }

    // 開始日・終了日でデータをフィルタリング
    function filterDataByDateRange(dataArray, labelField, startStr, endStr) {
      if (!dataArray || dataArray.length === 0) return [];
      const start = startStr ? new Date(startStr) : null;
      const end = endStr ? new Date(endStr) : null;
      
      return dataArray.filter(item => {
        const itemDate = new Date(item[labelField]);
        if (start && itemDate < start) return false;
        if (end && itemDate > end) return false;
        return true;
      });
    }

    // 日付範囲適用時の処理（改善版）
    function applyDateRange() {
      if (!quarterlyData) return;

      const startDate = document.getElementById('start-date').value;
      const endDate = document.getElementById('end-date').value;

      if (!startDate || !endDate) {
        alert('開始日と終了日を入力してください。');
        return;
      }

      const filtered = filterDataByDateRange(quarterlyData.quarters, 'filing_date', startDate, endDate);
      console.log(`Date range: ${startDate} to ${endDate}, filtered count: ${filtered.length}`);

      if (currentTab === 'quarterly') {
        // チャートを先に更新
        updateChart(filtered, 'quarterly', 'filing_date');
        
        // その後メトリクスを更新（最新のフィルタリング結果を使用）
        const latestInRange = getLatestFromArray(filtered);
        console.log('latestInRange:', latestInRange ? {...latestInRange} : null);

        if (latestInRange) {
          // ディープコピーしてからメトリクス更新に渡す
          const latestCopy = JSON.parse(JSON.stringify(latestInRange));
          updateMetricsWithQuarter(latestCopy, quarterlyData.quarters);
          updateAI(latestCopy.ai_analysis);
        } else {
          resetMetrics();
          updateAI(null);
        }
      } else if (currentTab === 'ttm') {
        // TTMタブの場合は期間指定を無視（全TTMデータを表示）
        if (ttmData && ttmData.ttm && ttmData.ttm.length > 0) {
          updateChart(ttmData.ttm, 'ttm', 'period');
        } else {
          updateChart([], 'ttm', '');
        }
        // TTMタブではメトリクスは更新しない（または別の処理）
      }
    }

    // プリセット設定
    function setPreset(range) {
      if (!quarterlyData) return;
      const dates = quarterlyData.quarters.map(q => q.filing_date).sort();
      const maxDate = dates[dates.length - 1];
      const maxDateObj = new Date(maxDate);

      let startDate;
      const endDate = maxDate; // 終了日は常に最新

      switch (range) {
        case 'all':
          startDate = dates[0];
          break;
        case '5y':
          startDate = new Date(maxDateObj.setFullYear(maxDateObj.getFullYear() - 5)).toISOString().split('T')[0];
          break;
        case '4y':
          startDate = new Date(maxDateObj.setFullYear(maxDateObj.getFullYear() - 4)).toISOString().split('T')[0];
          break;
        case '3y':
          startDate = new Date(maxDateObj.setFullYear(maxDateObj.getFullYear() - 3)).toISOString().split('T')[0];
          break;
        case '2y':
          startDate = new Date(maxDateObj.setFullYear(maxDateObj.getFullYear() - 2)).toISOString().split('T')[0];
          break;
        case '1y':
          startDate = new Date(maxDateObj.setFullYear(maxDateObj.getFullYear() - 1)).toISOString().split('T')[0];
          break;
        default:
          return;
      }

      // 開始日がデータの最小日付より前にならないように調整
      if (startDate < dates[0]) {
        startDate = dates[0];
      }

      document.getElementById('start-date').value = startDate;
      document.getElementById('end-date').value = endDate;
      applyDateRange();
    }

    function resetDateRange() {
      if (!quarterlyData) return;
      const dates = quarterlyData.quarters.map(q => q.filing_date).sort();
      document.getElementById('start-date').value = dates[0];
      document.getElementById('end-date').value = dates[dates.length - 1];
      applyDateRange();
    }

    function getLatestFromArray(dataArray) {
      if (!dataArray || dataArray.length === 0) return null;
      const sorted = [...dataArray].sort((a, b) => b.filing_date.localeCompare(a.filing_date));
      return sorted[0];
    }

    // YoY計算（四半期ベース）- デバッグ強化版
    function calculateYoY(latest, allQuarters) {
        const latestDate = latest.filing_date;
        const [year, month] = latestDate.split('-');
        const latestQuarter = Math.floor((parseInt(month) - 1) / 3) + 1;
        
        // デバッグ: allQuarters の内容を確認
        console.log('allQuarters for YoY:', allQuarters.map(q => ({ date: q.filing_date, year: q.filing_date.split('-')[0], quarter: Math.floor((parseInt(q.filing_date.split('-')[1]) - 1) / 3) + 1 })));

        // 前年の同じ四半期を探す
        const targetYear = parseInt(year) - 1;
        
        const candidates = allQuarters.filter(q => {
            const qYear = parseInt(q.filing_date.split('-')[0]);
            const qMonth = parseInt(q.filing_date.split('-')[1]);
            const qQuarter = Math.floor((qMonth - 1) / 3) + 1;
            return qYear === targetYear && qQuarter === latestQuarter;
        });

        console.log(`YoY candidates for ${latestDate} (Q${latestQuarter}):`, candidates.map(c => c.filing_date));

        if (candidates.length > 0) {
            // 最も近い日付のものを選ぶ（通常は1つだが、複数ある場合）
            const prevQuarter = candidates.reduce((prev, curr) => {
                const prevDiff = Math.abs(new Date(latestDate) - new Date(prev.filing_date));
                const currDiff = Math.abs(new Date(latestDate) - new Date(curr.filing_date));
                return currDiff < prevDiff ? curr : prev;
            });
            
            const prevEps = prevQuarter.adjusted_eps;
            console.log('Selected prevQuarter:', prevQuarter.filing_date, 'prevEps:', prevEps);
            if (Math.abs(prevEps) > 0.0001) {
                return (latest.adjusted_eps - prevEps) / Math.abs(prevEps);
            }
        }

        // フォールバック1: 4四半期前を探す（同じ並び順）
        const idx = allQuarters.findIndex(q => q.filing_date === latestDate);
        if (idx >= 4 && idx - 4 < allQuarters.length) {
            const prevEps = allQuarters[idx - 4].adjusted_eps;
            console.log('Fallback 1: using 4 quarters before, prevEps:', prevEps);
            if (Math.abs(prevEps) > 0.0001) {
                return (latest.adjusted_eps - prevEps) / Math.abs(prevEps);
            }
        }

        // フォールバック2: 日付が1年前のデータを直接探す（期間をまたぐ場合）
        const oneYearAgo = new Date(latestDate);
        oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
        const oneYearAgoStr = oneYearAgo.toISOString().split('T')[0];
        const prevByDate = allQuarters.find(q => q.filing_date === oneYearAgoStr);
        if (prevByDate && Math.abs(prevByDate.adjusted_eps) > 0.0001) {
            console.log('Fallback 2: exact date match', prevByDate.filing_date, prevByDate.adjusted_eps);
            return (latest.adjusted_eps - prevByDate.adjusted_eps) / Math.abs(prevByDate.adjusted_eps);
        }
        
        return null;
    }

    function updateMetricsWithQuarter(quarter, allQuarters) {
      console.log('Updating metrics with quarter:', quarter);
      document.getElementById('gaap-eps').innerText = `$${quarter.gaap_eps.toFixed(4)}`;
      document.getElementById('adj-eps').innerText = `$${quarter.adjusted_eps.toFixed(4)}`;
      
      const diff = quarter.adjusted_eps - quarter.gaap_eps;
      document.getElementById('diff').innerText = `$${diff.toFixed(4)}`;
      document.getElementById('diff').className = diff >= 0 ? 'text-2xl font-bold text-green-400' : 'text-2xl font-bold text-red-400';
      
      const yoy = calculateYoY(quarter, allQuarters);
      if (yoy !== null) {
        document.getElementById('yoy').innerText = (yoy * 100).toFixed(1) + '%';
        document.getElementById('yoy').className = yoy >= 0 ? 'text-2xl font-bold text-green-400' : 'text-2xl font-bold text-red-400';
      } else {
        document.getElementById('yoy').innerText = '--';
      }
    }

    function resetMetrics() {
      document.getElementById('gaap-eps').innerText = '$0.00';
      document.getElementById('adj-eps').innerText = '$0.00';
      document.getElementById('diff').innerText = '$0.00';
      document.getElementById('yoy').innerText = '--';
    }

    function updateAI(ai) {
      const badge = document.getElementById('health-badge');
      const commentEl = document.getElementById('ai-comment');
      const sourcesEl = document.getElementById('ai-sources');

      if (!ai) {
        badge.innerText = 'Good';
        badge.className = 'px-3 py-1 rounded-full text-sm font-semibold bg-green-600';
        badge.title = '健全性: Good';
        commentEl.innerHTML = '<p>分析コメント準備中</p>';
        sourcesEl.innerHTML = '';
        return;
      }

      badge.innerText = ai.health || 'Good';
      const colors = {
        'Excellent': 'bg-green-600',
        'Good': 'bg-green-600',
        'Caution': 'bg-yellow-600',
        'Warning': 'bg-red-600',
        'Error': 'bg-gray-600'
      };
      badge.className = `px-3 py-1 rounded-full text-sm font-semibold ${colors[ai.health] || 'bg-green-600'}`;
      
      const tooltips = {
        'Excellent': '健全性: Excellent（非常に健全、調整後EPSは持続可能）',
        'Good': '健全性: Good（調整項目がなく、EPSは安定しています）',
        'Caution': '健全性: Caution（一部の調整項目に注意が必要）',
        'Warning': '健全性: Warning（大幅な調整があり、実態を確認要）',
        'Error': '健全性: Error（AI分析エラー）'
      };
      badge.title = tooltips[ai.health] || '健全性評価';
      
      commentEl.innerHTML = `<p>${ai.comment || '分析コメント準備中'}</p>`;
      
      if (ai.sources && ai.sources.length) {
        let sourcesHtml = '<h4 class="font-semibold mb-2">引用ソース:</h4><ul class="list-disc pl-5 space-y-1">';
        ai.sources.forEach(source => {
          sourcesHtml += `<li><span class="font-mono text-xs">${source.item}:</span> "${source.snippet}"</li>`;
        });
        sourcesHtml += '</ul>';
        sourcesEl.innerHTML = sourcesHtml;
      } else {
        sourcesEl.innerHTML = '';
      }
    }

    function formatLabel(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length < 2) return dateStr;
      const [year, month] = parts;
      const quarter = Math.floor((parseInt(month) - 1) / 3) + 1;
      return `${year}-Q${quarter}`;
    }

    function updateChart(dataArray, type, labelField) {
      const ctx = document.getElementById('eps-chart').getContext('2d');

      if (!dataArray || dataArray.length === 0) {
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: 'line',
          data: { labels: [], datasets: [] },
          options: { plugins: { legend: { display: false } } }
        });
        return;
      }

      const sorted = [...dataArray].sort((a, b) => a[labelField].localeCompare(b[labelField]));
      const labels = sorted.map(item => formatLabel(item[labelField]));
      let gaapData, adjData;

      if (type === 'quarterly') {
        gaapData = sorted.map(item => item.gaap_eps);
        adjData = sorted.map(item => item.adjusted_eps);
      } else if (type === 'ttm') {
        gaapData = sorted.map(item => item.eps);
        adjData = sorted.map(item => item.adjusted_eps);
      } else {
        return;
      }

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'GAAP EPS',
              data: gaapData,
              borderColor: 'rgb(156, 163, 175)',
              backgroundColor: 'rgba(156, 163, 175, 0.1)',
              tension: 0.1,
              datalabels: {
                align: 'top',
                offset: 4,
                color: 'white',
                font: { size: 10 },
                formatter: (value) => value.toFixed(2)
              }
            },
            {
              label: 'Adjusted EPS',
              data: adjData,
              borderColor: 'rgb(34, 197, 94)',
              backgroundColor: 'rgba(34, 197, 94, 0.1)',
              tension: 0.1,
              datalabels: {
                align: 'bottom',
                offset: 4,
                color: '#4ade80',
                font: { size: 10 },
                formatter: (value) => value.toFixed(2)
              }
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: 'white' } },
            datalabels: {
              display: true,
              backgroundColor: 'rgba(0,0,0,0.6)',
              borderRadius: 4,
              padding: { top: 2, bottom: 2, left: 4, right: 4 }
            }
          },
          scales: {
            y: { 
              grid: { color: 'rgba(255, 255, 255, 0.1)' }, 
              ticks: { color: 'white' },
              beginAtZero: false
            },
            x: { 
              grid: { color: 'rgba(255, 255, 255, 0.1)' }, 
              ticks: { color: 'white', maxRotation: 45, autoSkip: true }
            }
          }
        }
      });
    }

    function updateAllAdjustments(quarters) {
      const container = document.getElementById('adjustments-accordion');
      const sorted = [...quarters].sort((a, b) => b.filing_date.localeCompare(a.filing_date));
      
      let html = '';
      sorted.forEach(q => {
        html += `<div class="border border-gray-700 rounded-lg overflow-hidden">`;
        html += `<div class="bg-gray-800 px-4 py-2 font-semibold border-b border-gray-700">${q.filing_date}</div>`;
        
        if (q.adjustments && q.adjustments.length > 0) {
          html += `<div class="p-4 bg-gray-750">`;
          html += `<table class="w-full text-sm">`;
          html += `<thead><tr class="text-gray-400"><th class="text-left">項目</th><th class="text-right">金額（税後）</th><th class="text-left">理由</th><th class="text-left">抽出元</th></tr></thead>`;
          html += `<tbody>`;
          q.adjustments.forEach(item => {
            html += `<tr class="border-t border-gray-700">`;
            html += `<td class="py-2">${item.item_name}</td>`;
            html += `<td class="text-right text-green-400">+$${(item.net_amount/1e6).toFixed(1)}M</td>`;
            html += `<td>${item.reason}</td>`;
            html += `<td><span class="text-xs bg-gray-600 px-2 py-1 rounded">${item.extracted_from}</span></td>`;
            html += `</tr>`;
          });
          html += `</tbody></table>`;
          html += `</div>`;
        } else {
          html += `<div class="p-4 text-gray-400">この四半期には調整項目はありません。</div>`;
        }
        html += `</div>`;
      });
      container.innerHTML = html;
    }

    async function switchTab(tab) {
      currentTab = tab;
      ['quarterly', 'ttm'].forEach(t => {
        const el = document.getElementById(`tab-${t}`);
        if (t === tab) {
          el.className = 'inline-block p-4 border-b-2 border-blue-600 text-blue-600 font-semibold';
        } else {
          el.className = 'inline-block p-4 border-b-2 border-transparent hover:text-gray-300';
        }
      });

      if (!currentTicker) return;

      if (tab === 'quarterly' && quarterlyData) {
        // タブ切り替え時に現在の日付範囲で再適用
        applyDateRange();
        updateAllAdjustments(quarterlyData.quarters);
      } else if (tab === 'ttm') {
        if (!ttmData || !ttmData.ttm || ttmData.ttm.length === 0) {
          updateChart([], 'ttm', '');
          document.getElementById('adjustments-accordion').innerHTML = '<p class="text-gray-400">TTMデータには調整内訳はありません。</p>';
          document.getElementById('ai-comment').innerHTML = '<p>TTMデータにはAI分析はありません。</p>';
          document.getElementById('ai-sources').innerHTML = '';
        } else {
          updateChart(ttmData.ttm, 'ttm', 'period');
          document.getElementById('adjustments-accordion').innerHTML = '<p class="text-gray-400">TTMデータには調整内訳はありません。</p>';
          document.getElementById('ai-comment').innerHTML = '<p>TTMデータにはAI分析はありません。</p>';
          document.getElementById('ai-sources').innerHTML = '';
        }
      }
    }

    window.onload = () => loadTicker('TSLA');
  </script>
</body>
</html>
