<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>銘柄一覧 - Adjusted EPS Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
  <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css">
  <style>
  :root {
    --bg: #0a0d14;
    --sur: #111520;
    --sur2: #161c2d;
    --bdr: #1e2840;
    --acc: #3b82f6;
    --grn: #10b981;
    --red: #f43f5e;
    --amb: #f59e0b;
    --txt: #e2e8f0;
    --mut: #64748b;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--txt);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }
  .shell {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 48px;
  }
  /* ヘッダー（後述） */
  header {
    border-bottom: 1px solid var(--bdr);
    padding: 16px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .15em;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-dot {
    width: 8px;
    height: 8px;
    background: var(--acc);
    border-radius: 50%;
    animation: pdot 2s ease-in-out infinite;
  }
  @keyframes pdot {
    0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,.4); }
    50% { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
  }
  .hdr-r {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .nav-links {
    display: flex;
    gap: 16px;
  }
  .nav-links a {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--mut);
    text-decoration: none;
    letter-spacing: .08em;
    padding: 5px 0;
    border-bottom: 1px solid transparent;
  }
  .nav-links a:hover {
    color: var(--acc);
    border-bottom-color: var(--acc);
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .search-box input {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--sur2);
    border: 1px solid var(--bdr);
    padding: 5px 10px;
    color: var(--txt);
    width: 120px;
  }
  .search-box button {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border: 1px solid var(--bdr);
    background: var(--sur2);
    color: var(--txt);
    cursor: pointer;
  }
  .search-box button:hover {
    border-color: var(--acc);
    color: var(--acc);
  }
  /* 以下、各ページ固有のスタイルはそのまま残す（例：テーブル、カードなど） */
</style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6">
<div class="shell">
  <header class="fixed top-0 left-0 right-0 bg-gray-800 shadow z-10">
    <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold">Adjusted EPS Analyzer</h1>
      <div class="space-x-4">
        <a href="index.html" class="text-blue-400 hover:text-blue-300">ダッシュボード</a>
        <a href="tickers.html" class="text-blue-400 hover:text-blue-300 font-semibold underline">銘柄一覧</a>
        <a href="#" class="text-blue-400 hover:text-blue-300">設定</a>
      </div>
      <div class="flex items-center space-x-2">
        <input type="text" id="ticker-search" placeholder="ティッカー (例: NVDA)" 
               class="px-3 py-1 bg-gray-700 rounded text-white" value="TSLA">
        <button onclick="window.location.href='index.html?ticker='+document.getElementById('ticker-search').value.toUpperCase()" class="bg-blue-600 px-4 py-1 rounded hover:bg-blue-700">
          検索
        </button>
      </div>
    </nav>
  </header>

  <main class="container mx-auto mt-24">
    <h2 class="text-3xl font-bold mb-6">銘柄一覧</h2>
    <div class="bg-gray-800 p-6 rounded-lg">
      <table id="tickers-table" class="display w-full text-sm text-gray-200" style="width:100%">
        <thead>
          <tr>
            <th>ティッカー</th>
            <th>会社名</th>
            <th>最新決算日</th>
            <th>GAAP EPS</th>
            <th>Adjusted EPS</th>
            <th>YoY成長率</th>
            <th>健全性</th>
          </tr>
        </thead>
      </table>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
  <script>
    $(document).ready(function() {
      $('#tickers-table').DataTable({
        ajax: {
          url: 'data/summary.json',
          dataSrc: 'tickers'
        },
        columns: [
          { 
            data: 'ticker',
            render: function(data, type, row) {
              if (type === 'display') {
                return `<a href="index.html?ticker=${data}" class="text-blue-400 hover:underline">${data}</a>`;
              }
              return data;
            }
          },
          { data: 'company_name' },
          { data: 'latest_filing_date' },
          { 
            data: 'gaap_eps',
            render: data => `$${data.toFixed(4)}`
          },
          { 
            data: 'adjusted_eps',
            render: data => `$${data.toFixed(4)}`
          },
          { 
            data: 'yoy_growth',
            render: function(data) {
              if (data === null) return '--';
              const pct = (data * 100).toFixed(1);
              const color = data >= 0 ? 'text-green-400' : 'text-red-400';
              return `<span class="${color}">${pct}%</span>`;
            }
          },
          { 
            data: 'health',
            render: function(data) {
              const colors = {
                'Excellent': 'bg-green-600',
                'Good': 'bg-green-600',
                'Caution': 'bg-yellow-600',
                'Warning': 'bg-red-600',
                'Error': 'bg-gray-600'
              };
              return `<span class="px-2 py-1 rounded-full text-xs font-semibold ${colors[data] || 'bg-green-600'}">${data}</span>`;
            }
          }
        ],
        layout: {
          topStart: {
            buttons: ['copyHtml5', 'excelHtml5', 'csvHtml5']
          }
        },
        order: [[0, 'asc']],
        pageLength: 25,
        language: {
          url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/ja.json'
        }
      });
    });

    // ヘッダーの検索ボックスでEnter押下時にも動作
    document.getElementById('ticker-search').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        window.location.href = 'index.html?ticker=' + this.value.toUpperCase();
      }
    });
  </script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    // 銘柄一覧ページのリンクをアクティブ表示
    const navTickers = document.getElementById('nav-tickers');
    if (navTickers) {
      navTickers.style.color = 'var(--acc)';
      navTickers.style.borderBottomColor = 'var(--acc)';
    }
  });
</script>
</div>
</body>
</html>
