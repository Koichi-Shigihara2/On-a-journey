<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市場モニタリング ダッシュボード</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; line-height: 1.5; }
        h1 { color: #2c3e50; }
        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem 2rem;
            margin: 1rem 0;
            background-color: #f9f9f9;
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        a { text-decoration: none; color: #2980b9; font-size: 1.2rem; font-weight: bold; }
        p { margin: 0.5rem 0 0 0; color: #555; }
        hr { margin: 2rem 0; }
    </style>
</head>
<body>
    <h1>📊 市場モニタリング ダッシュボード</h1>
    <p>各モジュールの分析レポート・データ可視化にアクセスできます。</p>

    <div class="card">
        <a href="./market-pulse/">📈 Market Pulse (日次市況分析)</a>
        <p>VIX、S&P500、NY騰落、スタイル比較、クレジットなど包括的な市況レポート</p>
    </div>

    <div class="card">
        <a href="./macro-pulse/">📉 Macro Pulse (マクロ経済指標)</a>
        <p>NFP、ISM、消費者信頼感、イールドカーブ、VVIXなど重要経済指標の時系列とサプライズ</p>
    </div>

    <hr>
    <p style="font-size: 0.9rem; color: #777;">自動更新: 毎日 08:00 JST (Market Pulse) / 日次 + 週次 (Macro Pulse)</p>
</body>
</html>
