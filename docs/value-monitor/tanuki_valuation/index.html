<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TANUKI VALUATION</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {--bg:#0a0d14; --sur:#111520; --sur2:#161c2d; --bdr:#1e2840; --acc:#c4d0ff; --txt:#e2e8f0; --mut:#b0c4e0;
           --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:14px;min-height:100vh}
    .shell{max-width:980px;margin:0 auto;padding:0 20px 64px}
    header{border-bottom:1px solid var(--bdr);padding:16px 0;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:var(--mono);font-size:16px;font-weight:700;letter-spacing:.15em}
    .hero{text-align:center;padding:48px 0;border-bottom:1px solid var(--bdr)}
    .hero-title{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--acc)}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-top:40px}
    .ticker-card{background:var(--sur);padding:24px;border-radius:8px;border:1px solid var(--bdr);transition:all .2s}
    .ticker-card:hover{background:var(--sur2);transform:translateY(-2px);box-shadow:0 0 0 3px rgba(196,208,255,.3)}
    .ticker-name{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--txt)}
    .value{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--acc);text-shadow:0 0 8px rgba(196,208,255,.5)}
    .status{font-size:12px;color:var(--mut);margin-top:8px}
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">TANUKI VALUATION</div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--mut)">KoichiеәЏ v5.1</div>
  </header>

  <div class="hero">
    <div class="hero-title">TANUKI VALUATION</div>
    <p style="color:var(--mut);margin-top:16px">жњ¬иіҒзљ„дңҰеЂ¤г‚’йЃҺеҺ»е®џзёңпә‹AIг‚»г‚°гѓҰгѓігѓ€KPIгЃ§е®џиЁәиЁ€з®—</p>
  </div>

  <div id="ticker-list" class="card-grid"></div>
</div>

<script>
  async function loadTickers() {
    const tickers = ["MSFT","AMZN","SOFI","TSLA","PLTR","CELH","NVDA","AMD","APP","SOUN","RKLB","ONDS","FIG"];
    const container = document.getElementById('ticker-list');
    
    for (let ticker of tickers) {
      const card = document.createElement('a');
      card.href = `stock.html?ticker=${ticker}`;
      card.className = 'ticker-card';
      card.innerHTML = `
        <div class="ticker-name">${ticker}</div>
        <div class="value" id="val-${ticker}">иЁ€з®—дё­...</div>
        <div class="status">жњЂж–°ж›өж–°: <span id="date-${ticker}">--</span></div>
      `;
      container.appendChild(card);
      
      try {
        const res = await fetch(`data/${ticker}/latest.json`);
        if (!res.ok) throw new Error("no data");
        const data = await res.json();
        document.getElementById(`val-${ticker}`).textContent = `$${data.intrinsic_value_pt.toLocaleString('en-US')}`;
        document.getElementById(`date-${ticker}`).textContent = data.calculation_date || '--';
      } catch(e) {
        document.getElementById(`val-${ticker}`).textContent = 'гѓ‡гѓәг‚үгЃҒгЃ—';
      }
    }
  }
  loadTickers();
</script>
</body>
</html>
