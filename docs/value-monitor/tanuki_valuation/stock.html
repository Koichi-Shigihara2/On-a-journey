<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TANUKI VALUATION - Stock Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    :root {
      --bg: #0a0d14;
      --sur: #111520;
      --sur2: #161c2d;
      --sur3: #1a2035;
      --bdr: #1e2840;
      --acc: #c4d0ff;
      --acc2: #8b9dff;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --orange: #fb923c;
      --txt: #e2e8f0;
      --mut: #94a3b8;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      line-height: 1.6;
    }
    .shell { max-width: 1000px; margin: 0 auto; padding: 0 24px 80px; }
    
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0; border-bottom: 1px solid var(--bdr);
      position: sticky; top: 0; background: var(--bg); z-index: 100;
    }
    .back-link {
      font-family: var(--mono); font-size: 12px; color: var(--acc);
      text-decoration: none; display: flex; align-items: center; gap: 6px;
    }
    .back-link:hover { text-decoration: underline; }
    .header-right { font-family: var(--mono); font-size: 10px; color: var(--mut); }
    
    .hero { padding: 40px 0 32px; border-bottom: 1px solid var(--bdr); }
    .ticker-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; }
    .ticker-symbol { font-family: var(--mono); font-size: 36px; font-weight: 700; color: var(--txt); }
    
    .value-display { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .value-box {
      background: var(--sur); border: 1px solid var(--bdr);
      border-radius: 12px; padding: 24px;
    }
    .value-box.primary {
      border-color: var(--acc);
      background: linear-gradient(135deg, var(--sur) 0%, var(--sur2) 100%);
    }
    .value-label { font-size: 12px; color: var(--mut); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .value-main { font-family: var(--mono); font-size: 42px; font-weight: 700; color: var(--acc); text-shadow: 0 0 30px rgba(196,208,255,.3); }
    .value-sub { font-family: var(--mono); font-size: 14px; color: var(--mut); margin-top: 8px; }
    .upside-badge {
      display: inline-block; font-family: var(--mono); font-size: 14px; font-weight: 700;
      padding: 6px 12px; border-radius: 6px; margin-top: 12px;
    }
    .upside-badge.positive { background: rgba(74, 222, 128, 0.15); color: var(--green); }
    .upside-badge.negative { background: rgba(248, 113, 113, 0.15); color: var(--red); }
    
    .wacc-badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 12px; color: var(--acc2);
      background: var(--sur2); padding: 6px 12px; border-radius: 6px; margin-top: 12px;
    }
    .wacc-badge .beta { color: var(--mut); font-size: 11px; }
    
    /* Sensitivity Section */
    .sensitivity-section {
      margin-top: 32px; background: var(--sur); border: 1px solid var(--bdr);
      border-radius: 12px; padding: 24px;
    }
    .sensitivity-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 16px; }
    .sensitivity-title { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--acc); letter-spacing: .05em; }
    
    .wacc-slider-container { display: flex; align-items: center; gap: 12px; }
    .wacc-slider-label { font-size: 12px; color: var(--mut); }
    .wacc-slider {
      width: 180px; height: 6px; -webkit-appearance: none; appearance: none;
      background: var(--sur2); border-radius: 3px; outline: none;
    }
    .wacc-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; background: var(--acc);
      border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px rgba(196,208,255,.4);
    }
    .wacc-slider-value { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--acc); min-width: 50px; }
    
    .sensitivity-matrix { margin-top: 16px; overflow-x: auto; }
    .matrix-table { width: 100%; border-collapse: collapse; min-width: 400px; }
    .matrix-table th, .matrix-table td {
      padding: 12px 16px; text-align: center; font-family: var(--mono); font-size: 13px;
    }
    .matrix-table th {
      background: var(--sur2); color: var(--mut); font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .matrix-table th.corner { background: var(--sur); }
    .matrix-table td { background: var(--sur2); color: var(--txt); border: 1px solid var(--sur); transition: all .2s; }
    .matrix-table td.base-cell { background: var(--acc); color: var(--bg); font-weight: 700; box-shadow: 0 0 15px rgba(196,208,255,.3); }
    .matrix-table td.cheap { background: rgba(74, 222, 128, 0.2); color: var(--green); }
    .matrix-table td.expensive { background: rgba(248, 113, 113, 0.2); color: var(--red); }
    .matrix-table .row-label { text-align: right; background: var(--sur); color: var(--mut); font-size: 11px; }
    
    .matrix-legend { display: flex; justify-content: center; gap: 24px; margin-top: 16px; font-size: 12px; color: var(--mut); flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-color { width: 16px; height: 16px; border-radius: 4px; }
    .legend-color.cheap { background: rgba(74, 222, 128, 0.3); }
    .legend-color.base { background: var(--acc); }
    .legend-color.expensive { background: rgba(248, 113, 113, 0.3); }
    
    .future-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 24px; }
    .future-card { background: var(--sur); border: 1px solid var(--bdr); border-radius: 8px; padding: 16px; text-align: center; }
    .future-year { font-size: 11px; color: var(--mut); text-transform: uppercase; letter-spacing: .06em; }
    .future-value { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--txt); margin-top: 4px; }
    
    .scenario-section { margin-top: 24px; }
    .scenario-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
    .scenario-card { background: var(--sur); border: 2px solid var(--bdr); border-radius: 10px; padding: 16px; text-align: center; }
    .scenario-card.bear { border-color: var(--red); background: rgba(248, 113, 113, 0.05); }
    .scenario-card.base { border-color: var(--acc); background: rgba(196, 208, 255, 0.05); }
    .scenario-card.bull { border-color: var(--green); background: rgba(74, 222, 128, 0.05); }
    .scenario-label { font-family: var(--mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .scenario-card.bear .scenario-label { color: var(--red); }
    .scenario-card.base .scenario-label { color: var(--acc); }
    .scenario-card.bull .scenario-label { color: var(--green); }
    .scenario-rate { font-size: 11px; color: var(--mut); margin-bottom: 4px; }
    .scenario-price { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--txt); }
    
    .calc-section { margin-top: 40px; }
    .section-title {
      font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--acc);
      letter-spacing: .1em; margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--bdr); }
    
    .calc-flow { display: flex; flex-direction: column; gap: 16px; }
    .calc-step { background: var(--sur); border: 1px solid var(--bdr); border-radius: 8px; overflow: hidden; }
    .calc-step-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; cursor: pointer; transition: background .2s; }
    .calc-step-header:hover { background: var(--sur2); }
    .calc-step-title { display: flex; align-items: center; gap: 12px; }
    .step-num { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--acc); background: var(--sur2); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .step-name { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--txt); }
    .step-result { font-family: var(--mono); font-size: 14px; color: var(--acc); }
    .calc-step-body { padding: 0 20px 20px; display: none; }
    .calc-step.open .calc-step-body { display: block; }
    .calc-step.open .calc-step-header { border-bottom: 1px solid var(--bdr); }
    
    .formula-box { background: var(--sur2); border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .formula-box code { font-family: var(--mono); font-size: 12px; color: var(--acc); display: block; margin-bottom: 12px; }
    .formula-desc { font-size: 13px; color: var(--mut); line-height: 1.7; }
    
    .inputs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
    .input-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--sur2); border-radius: 6px; }
    .input-label { font-size: 12px; color: var(--mut); }
    .input-value { font-family: var(--mono); font-size: 13px; color: var(--txt); }
    
    .chart-container { margin-top: 40px; }
    #valuation-chart { width: 100%; height: 300px; background: var(--sur); border: 1px solid var(--bdr); border-radius: 8px; }
    
    footer { margin-top: 60px; padding: 24px 0; border-top: 1px solid var(--bdr); font-size: 12px; color: var(--mut); text-align: center; }
    
    .toggle-arrow { font-size: 10px; color: var(--mut); transition: transform .2s; }
    .calc-step.open .toggle-arrow { transform: rotate(180deg); }
    
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; gap: 16px; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--sur2); border-top-color: var(--acc); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error-box { background: rgba(248, 113, 113, 0.1); border: 1px solid var(--red); border-radius: 8px; padding: 24px; text-align: center; }
    .error-title { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--red); margin-bottom: 8px; }
    
    @media (max-width: 768px) {
      .value-display, .inputs-grid { grid-template-columns: 1fr; }
      .future-grid, .scenario-grid { grid-template-columns: 1fr; }
      .wacc-slider-container { flex-direction: column; align-items: flex-start; }
      .wacc-slider { width: 100%; }
    }
  </style>
</head>
<body>
<div class="shell" id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    <span style="color:var(--mut)">Loading valuation data...</span>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const ticker = params.get('ticker') || 'TSLA';

let globalData = null;

const fmt = (n) => n?.toFixed(2) ?? '—';
const fmtInt = (n) => n?.toLocaleString() ?? '—';
const fmtPct = (n) => n != null ? (n * 100).toFixed(1) + '%' : '—';
const fmtB = (n) => {
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  return '$' + fmtInt(Math.round(n));
};

async function loadData() {
  try {
    const response = await fetch(`data/${ticker}/latest.json`);
    if (!response.ok) throw new Error('Data not found');
    globalData = await response.json();
    render(globalData);
  } catch (error) {
    document.getElementById('app').innerHTML = `
      <header><a href="index.html" class="back-link">← BACK TO LIST</a></header>
      <div class="hero">
        <div class="error-box">
          <div class="error-title">ERROR</div>
          <p>Failed to load data for ${ticker}</p>
        </div>
      </div>`;
  }
}

function render(d) {
  const ivps = d.intrinsic_value_per_share || 0;
  const currentPrice = d.components?.current_price || 0;
  const upside = d.upside_percent || 0;
  const calcDate = d.calculation_date || '—';
  const formula = d.formula || 'Koichi式';
  
  const v0 = d.v0 || 0;
  const alpha = d.alpha || 0;
  const pvHigh = d.components?.pv_high || 0;
  const pvTerminal = d.components?.pv_terminal || 0;
  const highGrowthRate = d.components?.high_growth_rate_used || 0;
  const highGrowthYears = d.components?.high_growth_years || 5;
  const fcfAvg = d.components?.fcf_5yr_avg || 0;
  const roeAvg = d.components?.roe_used || 0;
  const dilutedShares = d.components?.diluted_shares || 0;
  const rpo = d.components?.rpo || 0;
  const rpoPV = d.components?.rpo_adjustment || 0;
  
  const wacc = d.wacc || {};
  const waccValue = wacc.value || 0.085;
  const beta = wacc.beta || 1.0;
  const riskFreeRate = wacc.risk_free_rate || 0.043;
  const marketReturn = wacc.market_return || 0.10;
  
  const sensitivity = d.sensitivity || {};
  const waccValues = sensitivity.wacc_values || [waccValue - 0.01, waccValue, waccValue + 0.01];
  const growthYears = sensitivity.growth_years || [3, 5, 7];
  const matrix = sensitivity.matrix || [[], [], []];
  
  const growthScenarios = d.growth_scenarios || {};
  const growthSource = growthScenarios.primary?.source || 'fcf_cagr';
  const growthRate = growthScenarios.primary?.rate || highGrowthRate;
  
  const scenarioValuations = d.scenario_valuations;
  const futureVals = d.future_values || {};
  
  document.getElementById('app').innerHTML = `
    <header>
      <a href="index.html" class="back-link">← BACK TO LIST</a>
      <span class="header-right">v5.3 | ${calcDate}</span>
    </header>
    
    <div class="hero">
      <div class="ticker-header">
        <span class="ticker-symbol">${ticker}</span>
      </div>
      
      <div class="value-display">
        <div class="value-box primary">
          <div class="value-label">Intrinsic Value</div>
          <div class="value-main" id="displayIvps">$${fmt(ivps)}</div>
          <div class="value-sub">理論株価（Koichi式）</div>
          <div class="wacc-badge">
            📊 WACC: <span id="displayWacc">${fmtPct(waccValue)}</span>
            <span class="beta">β=${beta.toFixed(2)}</span>
          </div>
        </div>
        <div class="value-box">
          <div class="value-label">Current Price</div>
          <div class="value-main" style="color:var(--txt)">$${fmt(currentPrice)}</div>
          <div class="value-sub">現在株価</div>
          <div class="upside-badge ${upside >= 0 ? 'positive' : 'negative'}" id="displayUpside">
            ${upside >= 0 ? '▲' : '▼'} ${Math.abs(upside).toFixed(1)}%
          </div>
        </div>
      </div>
      
      <div class="sensitivity-section">
        <div class="sensitivity-header">
          <div class="sensitivity-title">📈 SENSITIVITY ANALYSIS</div>
          <div class="wacc-slider-container">
            <span class="wacc-slider-label">WACC調整:</span>
            <input type="range" class="wacc-slider" id="waccSlider" 
                   min="-2" max="2" step="0.5" value="0"
                   oninput="updateWacc(this.value)">
            <span class="wacc-slider-value" id="waccDeltaDisplay">±0%</span>
          </div>
        </div>
        
        <div class="sensitivity-matrix">
          <table class="matrix-table" id="sensitivityTable">
            <thead>
              <tr>
                <th class="corner">WACC \\ Years</th>
                ${growthYears.map(y => `<th>${y}年</th>`).join('')}
              </tr>
            </thead>
            <tbody id="matrixBody">
              ${renderMatrixRows(matrix, waccValues, growthYears, currentPrice, 1)}
            </tbody>
          </table>
        </div>
        
        <div class="matrix-legend">
          <div class="legend-item"><div class="legend-color cheap"></div><span>割安 (>10%)</span></div>
          <div class="legend-item"><div class="legend-color base"></div><span>基準値</span></div>
          <div class="legend-item"><div class="legend-color expensive"></div><span>割高 (<-10%)</span></div>
        </div>
      </div>
      
      ${scenarioValuations ? `
      <div class="scenario-section">
        <h3 class="section-title">SCENARIO VALUATIONS</h3>
        <div class="scenario-grid">
          <div class="scenario-card bear">
            <div class="scenario-label">🐻 Bear</div>
            <div class="scenario-rate">成長率: ${fmtPct(scenarioValuations.bear?.growth_rate)}</div>
            <div class="scenario-price">$${fmt(scenarioValuations.bear?.intrinsic_value_per_share)}</div>
          </div>
          <div class="scenario-card base">
            <div class="scenario-label">📊 Base</div>
            <div class="scenario-rate">成長率: ${fmtPct(scenarioValuations.base?.growth_rate)}</div>
            <div class="scenario-price">$${fmt(scenarioValuations.base?.intrinsic_value_per_share)}</div>
          </div>
          <div class="scenario-card bull">
            <div class="scenario-label">🐂 Bull</div>
            <div class="scenario-rate">成長率: ${fmtPct(scenarioValuations.bull?.growth_rate)}</div>
            <div class="scenario-price">$${fmt(scenarioValuations.bull?.intrinsic_value_per_share)}</div>
          </div>
        </div>
      </div>
      ` : ''}
      
      <div class="future-grid">
        ${Object.entries(futureVals).map(([k, v]) => `
          <div class="future-card">
            <div class="future-year">${k}</div>
            <div class="future-value">$${fmt(v)}</div>
          </div>
        `).join('')}
      </div>
    </div>
    
    <div class="calc-section">
      <h2 class="section-title">CALCULATION BREAKDOWN</h2>
      <div class="calc-flow">
        <div class="calc-step">
          <div class="calc-step-header" onclick="toggleStep(this)">
            <div class="calc-step-title">
              <span class="step-num">1</span>
              <span class="step-name">動的WACC計算（CAPM）</span>
            </div>
            <div style="display:flex;align-items:center;gap:16px">
              <span class="step-result">${fmtPct(waccValue)}</span>
              <span class="toggle-arrow">▼</span>
            </div>
          </div>
          <div class="calc-step-body">
            <div class="formula-box">
              <code>WACC = Rf + β × (Rm - Rf)</code>
              <p class="formula-desc">CAPM（資本資産評価モデル）により、企業固有のリスク（β）を反映した割引率を計算。</p>
            </div>
            <div class="inputs-grid">
              <div class="input-item"><span class="input-label">Rf（リスクフリー）</span><span class="input-value">${fmtPct(riskFreeRate)}</span></div>
              <div class="input-item"><span class="input-label">Rm（市場期待）</span><span class="input-value">${fmtPct(marketReturn)}</span></div>
              <div class="input-item"><span class="input-label">β</span><span class="input-value">${beta.toFixed(2)}</span></div>
              <div class="input-item"><span class="input-label">WACC</span><span class="input-value">${fmtPct(waccValue)}</span></div>
            </div>
          </div>
        </div>
        
        <div class="calc-step">
          <div class="calc-step-header" onclick="toggleStep(this)">
            <div class="calc-step-title">
              <span class="step-num">2</span>
              <span class="step-name">成長率（${growthSource === 'segment_weighted' ? 'セグメント加重' : 'FCF CAGR'}）</span>
            </div>
            <div style="display:flex;align-items:center;gap:16px">
              <span class="step-result">${fmtPct(growthRate)}</span>
              <span class="toggle-arrow">▼</span>
            </div>
          </div>
          <div class="calc-step-body">
            <div class="formula-box">
              <code>CAGR = (FCF_最新 / FCF_最古)^(1/(n-1)) - 1</code>
              <p class="formula-desc">直近5年のFCFの年平均成長率（15%〜50%にクリップ）。</p>
            </div>
            <div class="inputs-grid">
              <div class="input-item"><span class="input-label">成長率ソース</span><span class="input-value">${growthSource}</span></div>
              <div class="input-item"><span class="input-label">高成長率</span><span class="input-value">${fmtPct(growthRate)}</span></div>
              <div class="input-item"><span class="input-label">高成長期間</span><span class="input-value">${highGrowthYears}年</span></div>
              <div class="input-item"><span class="input-label">ターミナル成長率</span><span class="input-value">3.0%</span></div>
            </div>
          </div>
        </div>
        
        <div class="calc-step">
          <div class="calc-step-header" onclick="toggleStep(this)">
            <div class="calc-step-title">
              <span class="step-num">3</span>
              <span class="step-name">2段階DCF計算</span>
            </div>
            <div style="display:flex;align-items:center;gap:16px">
              <span class="step-result">${fmtB(v0)}</span>
              <span class="toggle-arrow">▼</span>
            </div>
          </div>
          <div class="calc-step-body">
            <div class="formula-box">
              <code>V₀ = Σ(FCF × (1+g)^t / (1+WACC)^t) + TV/(1+WACC)^n</code>
            </div>
            <div class="inputs-grid">
              <div class="input-item"><span class="input-label">FCF 5年平均</span><span class="input-value">${fmtB(fcfAvg)}</span></div>
              <div class="input-item"><span class="input-label">高成長期PV</span><span class="input-value">${fmtB(pvHigh)}</span></div>
              <div class="input-item"><span class="input-label">ターミナルPV</span><span class="input-value">${fmtB(pvTerminal)}</span></div>
              <div class="input-item"><span class="input-label">V₀</span><span class="input-value">${fmtB(v0)}</span></div>
            </div>
          </div>
        </div>
        
        <div class="calc-step">
          <div class="calc-step-header" onclick="toggleStep(this)">
            <div class="calc-step-title">
              <span class="step-num">4</span>
              <span class="step-name">α（成長期待プレミアム）</span>
            </div>
            <div style="display:flex;align-items:center;gap:16px">
              <span class="step-result">×${(1 + alpha).toFixed(3)}</span>
              <span class="toggle-arrow">▼</span>
            </div>
          </div>
          <div class="calc-step-body">
            <div class="formula-box">
              <code>α = min(1.0, max(0, (ROE × 0.6 / WACC) × 0.7))</code>
            </div>
            <div class="inputs-grid">
              <div class="input-item"><span class="input-label">ROE</span><span class="input-value">${fmtPct(roeAvg)}</span></div>
              <div class="input-item"><span class="input-label">α</span><span class="input-value">${alpha.toFixed(4)}</span></div>
            </div>
          </div>
        </div>
        
        ${rpo > 0 ? `
        <div class="calc-step">
          <div class="calc-step-header" onclick="toggleStep(this)">
            <div class="calc-step-title">
              <span class="step-num">5</span>
              <span class="step-name">RPO補正</span>
            </div>
            <div style="display:flex;align-items:center;gap:16px">
              <span class="step-result">+${fmtB(rpoPV)}</span>
              <span class="toggle-arrow">▼</span>
            </div>
          </div>
          <div class="calc-step-body">
            <div class="formula-box">
              <code>RPO_PV = RPO / (1 + 15%)^1.5</code>
            </div>
            <div class="inputs-grid">
              <div class="input-item"><span class="input-label">RPO</span><span class="input-value">${fmtB(rpo)}</span></div>
              <div class="input-item"><span class="input-label">RPO現在価値</span><span class="input-value">${fmtB(rpoPV)}</span></div>
            </div>
          </div>
        </div>
        ` : ''}
        
        <div class="calc-step">
          <div class="calc-step-header" onclick="toggleStep(this)">
            <div class="calc-step-title">
              <span class="step-num">${rpo > 0 ? '6' : '5'}</span>
              <span class="step-name">本質的価値（P_t）算出</span>
            </div>
            <div style="display:flex;align-items:center;gap:16px">
              <span class="step-result">$${fmt(ivps)}</span>
              <span class="toggle-arrow">▼</span>
            </div>
          </div>
          <div class="calc-step-body">
            <div class="formula-box">
              <code>P_t = (V₀ + RPO_PV) × (1 + α) / 株式数</code>
            </div>
            <div class="inputs-grid">
              <div class="input-item"><span class="input-label">V₀</span><span class="input-value">${fmtB(v0)}</span></div>
              <div class="input-item"><span class="input-label">希薄化後株式数</span><span class="input-value">${fmtInt(dilutedShares)}</span></div>
              <div class="input-item"><span class="input-label">P_t</span><span class="input-value">${fmtB((v0 + rpoPV) * (1 + alpha))}</span></div>
              <div class="input-item"><span class="input-label">1株当り</span><span class="input-value">$${fmt(ivps)}</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="chart-container">
      <h2 class="section-title">VALUATION COMPONENTS</h2>
      <div id="valuation-chart"></div>
    </div>
    
    <footer>
      <p>計算日: ${calcDate} | ${formula}</p>
      <p style="margin-top:8px"><a href="index.html" style="color:var(--acc);text-decoration:none">銘柄一覧に戻る</a></p>
    </footer>
  `;
  
  renderChart(pvHigh, pvTerminal, alpha, v0, rpoPV);
}

function renderMatrixRows(matrix, waccValues, growthYears, currentPrice, baseRowIdx) {
  return matrix.map((row, i) => `
    <tr>
      <td class="row-label">${fmtPct(waccValues[i])}</td>
      ${row.map((price, j) => {
        const isBase = i === baseRowIdx && j === 1;
        const cls = isBase ? 'base-cell' : (price > currentPrice * 1.1 ? 'cheap' : (price < currentPrice * 0.9 ? 'expensive' : ''));
        return `<td class="${cls}">$${fmt(price)}</td>`;
      }).join('')}
    </tr>
  `).join('');
}

function updateWacc(delta) {
  const d = parseFloat(delta);
  document.getElementById('waccDeltaDisplay').textContent = d >= 0 ? `+${d}%` : `${d}%`;
  
  if (!globalData) return;
  
  const baseWacc = globalData.wacc?.value || 0.085;
  const newWacc = baseWacc + (d / 100);
  const sensitivity = globalData.sensitivity || {};
  const matrix = sensitivity.matrix || [];
  const waccValues = sensitivity.wacc_values || [];
  const growthYears = sensitivity.growth_years || [3, 5, 7];
  const currentPrice = globalData.components?.current_price || 0;
  
  // Adjust matrix values by WACC delta
  const adjustedWaccValues = waccValues.map(w => w + (d / 100));
  const adjustFactor = baseWacc / newWacc;
  const adjustedMatrix = matrix.map(row => row.map(p => p * adjustFactor));
  
  document.getElementById('matrixBody').innerHTML = renderMatrixRows(adjustedMatrix, adjustedWaccValues, growthYears, currentPrice, 1);
  document.getElementById('displayWacc').textContent = fmtPct(newWacc);
  
  // Recalculate IVPS (simplified)
  const baseIvps = globalData.intrinsic_value_per_share || 0;
  const newIvps = baseIvps * adjustFactor;
  document.getElementById('displayIvps').textContent = '$' + fmt(newIvps);
  
  const newUpside = ((newIvps / currentPrice) - 1) * 100;
  const badge = document.getElementById('displayUpside');
  badge.className = 'upside-badge ' + (newUpside >= 0 ? 'positive' : 'negative');
  badge.textContent = (newUpside >= 0 ? '▲' : '▼') + ' ' + Math.abs(newUpside).toFixed(1) + '%';
}

function toggleStep(header) {
  header.parentElement.classList.toggle('open');
}

function renderChart(pvHigh, pvTerminal, alpha, v0, rpoPV) {
  const hasRPO = rpoPV > 0;
  const totalV0 = v0 + rpoPV;
  
  const x = hasRPO 
    ? ['PV高成長期', 'PVターミナル', 'V₀', 'RPO PV', 'αプレミアム', '本質的価値']
    : ['PV高成長期', 'PVターミナル', 'V₀', 'αプレミアム', '本質的価値'];
  
  const y = hasRPO
    ? [pvHigh, pvTerminal, 0, rpoPV, totalV0 * alpha, 0]
    : [pvHigh, pvTerminal, 0, v0 * alpha, 0];
  
  const measure = hasRPO
    ? ['relative', 'relative', 'total', 'relative', 'relative', 'total']
    : ['relative', 'relative', 'total', 'relative', 'total'];
  
  const text = (hasRPO
    ? [pvHigh, pvTerminal, v0, rpoPV, totalV0 * alpha, totalV0 * (1 + alpha)]
    : [pvHigh, pvTerminal, v0, v0 * alpha, v0 * (1 + alpha)]
  ).map(n => '$' + Math.round(n).toLocaleString());
  
  Plotly.newPlot('valuation-chart', [{
    type: 'waterfall', orientation: 'v', x, y, measure, text, textposition: 'outside',
    connector: { line: { color: '#1e2840' } },
    increasing: { marker: { color: '#4ade80' } },
    decreasing: { marker: { color: '#f87171' } },
    totals: { marker: { color: '#c4d0ff' } }
  }], {
    paper_bgcolor: '#111520', plot_bgcolor: '#111520',
    font: { family: 'Space Mono', color: '#94a3b8', size: 11 },
    margin: { t: 40, b: 60, l: 60, r: 40 }, showlegend: false,
    yaxis: { gridcolor: '#1e2840', tickformat: '$,.0f' },
    xaxis: { tickangle: -30 }
  }, { displayModeBar: false, responsive: true });
}

loadData();
</script>
</body>
