﻿<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adjusted EPS Analyzer · 管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* 同じデザイン変数を使用 */
    :root {
      --bg: #0a0d14; --sur: #111520; --sur2: #161c2d; --bdr: #1e2840;
      --acc: #3b82f6; --grn: #10b981; --red: #f43f5e; --amb: #f59e0b;
      --txt: #e2e8f0; --mut: #64748b;
      --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--sans);
      font-size: 14px;
      padding: 20px;
    }
    .shell { max-width: 1000px; margin: 0 auto; }
    header {
      border-bottom: 1px solid var(--bdr);
      padding: 16px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .logo {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .token-input {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .token-input input {
      flex: 1;
      background: var(--sur2);
      border: 1px solid var(--bdr);
      padding: 8px 12px;
      color: var(--txt);
      font-family: var(--mono);
    }
    button {
      font-family: var(--mono);
      font-size: 11px;
      padding: 8px 16px;
      border: 1px solid var(--bdr);
      background: var(--sur2);
      color: var(--txt);
      cursor: pointer;
    }
    button:hover { border-color: var(--acc); color: var(--acc); }
    .panel {
      background: var(--sur);
      border: 1px solid var(--bdr);
      padding: 20px;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--mut);
      text-align: left;
      padding: 8px 0;
      border-bottom: 1px solid var(--bdr);
    }
    td {
      padding: 8px 0;
      border-bottom: 1px solid rgba(30,40,64,.5);
    }
    .checkbox-col { width: 30px; }
    .status-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 2px;
    }
    .status-ok { background: rgba(16,185,129,.15); color: var(--grn); }
    .status-old { background: rgba(245,158,11,.15); color: var(--amb); }
    .error { color: var(--red); }
    .success { color: var(--grn); }
    .form-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .form-row input {
      background: var(--sur2);
      border: 1px solid var(--bdr);
      padding: 6px 10px;
      color: var(--txt);
      font-family: var(--mono);
    }
    hr { border: none; border-top: 1px solid var(--bdr); margin: 20px 0; }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">
      <img src="../../common/images/logo.png" style="height:30px" alt="TANUKI">
      <span>管理ダッシュボード</span>
    </div>
    <div>
      <a href="index.html" style="color:var(--acc);">← ダッシュボードに戻る</a>
    </div>
  </header>

  <!-- トークン入力 -->
  <div class="token-input">
    <input type="password" id="token" placeholder="GitHub Personal Access Token (repo 権限)" value="">
    <button id="loadBtn">読み込む</button>
  </div>

  <!-- メインコンテンツ (token が有効な場合のみ表示) -->
  <div id="content" style="display:none;">

    <!-- 現在の監視銘柄一覧 -->
    <div class="panel">
      <h3 style="font-family:var(--mono); margin-bottom:15px;">📋 監視銘柄一覧</h3>
      <table id="tickerTable">
        <thead>
          <tr><th class="checkbox-col"><input type="checkbox" id="selectAll"></th><th>ティッカー</th><th>CIK</th><th>会社名</th><th>最終更新</th><th>状態</th></tr>
        </thead>
        <tbody id="tickerList"></tbody>
      </table>
      <div style="margin-top:15px; display:flex; gap:10px;">
        <button id="updateSelected">選択した銘柄を更新</button>
        <button id="refreshList">↻ リスト再読込</button>
      </div>
    </div>

    <!-- 新規ティッカー登録 -->
    <div class="panel">
      <h3 style="font-family:var(--mono); margin-bottom:15px;">➕ 新規ティッカー登録</h3>
      <div class="form-row">
        <input type="text" id="newTicker" placeholder="ティッカー (例: AAPL)" style="width:150px;">
        <input type="text" id="newCik" placeholder="CIK (空欄で自動取得)" style="width:200px;">
        <input type="text" id="newName" placeholder="会社名 (任意)" style="width:250px;">
        <button id="lookupCik">CIK 自動取得</button>
        <button id="addTicker">追加</button>
      </div>
      <div id="addResult" style="margin-top:10px; font-family:var(--mono);"></div>
    </div>

    <!-- 最終更新日時 (グローバル) -->
    <div class="panel">
      <span style="font-family:var(--mono); color:var(--mut);">データ最終更新: </span><span id="globalLastUpdated">—</span>
    </div>
  </div>
</div>

<script>
  const REPO_OWNER = 'Koichi-Shigihara2';
  const REPO_NAME = 'On-a-journey';
  const BRANCH = 'refactor/reorganize';   // 実際のブランチ名に合わせてください

  let token = '';
  let tickerList = [];

  const contentDiv = document.getElementById('content');
  const tokenInput = document.getElementById('token');
  const loadBtn = document.getElementById('loadBtn');
  const refreshBtn = document.getElementById('refreshList');
  const selectAll = document.getElementById('selectAll');
  const updateSelectedBtn = document.getElementById('updateSelected');
  const lookupCikBtn = document.getElementById('lookupCik');
  const addTickerBtn = document.getElementById('addTicker');
  const tickerListTbody = document.getElementById('tickerList');
  const globalLastUpdatedSpan = document.getElementById('globalLastUpdated');
  const addResultDiv = document.getElementById('addResult');

  // GitHub API のヘッダー
  function apiHeaders() {
    return {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github.v3+json'
    };
  }

  // ファイルの内容を取得 (Base64 デコード)
  async function fetchFileContent(path) {
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}`;
    const res = await fetch(url, { headers: apiHeaders() });
    if (!res.ok) throw new Error(`ファイル取得失敗: ${path}`);
    const data = await res.json();
    const content = atob(data.content.replace(/\n/g, ''));
    return { content, sha: data.sha };
  }

  // ファイルを更新/作成 (コミット)
  async function updateFile(path, content, message, sha = null) {
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
    const body = {
      message,
      content: btoa(unescape(encodeURIComponent(content))), // UTF-8 対応
      branch: BRANCH
    };
    if (sha) body.sha = sha;
    const res = await fetch(url, {
      method: 'PUT',
      headers: apiHeaders(),
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`コミット失敗: ${path}`);
    return await res.json();
  }

  // YAML パース (簡易)
  function parseYaml(yaml) {
    const lines = yaml.split('\n');
    const tickers = [];
    let inList = false;
    for (let line of lines) {
      line = line.trim();
      if (line.startsWith('tickers:')) { inList = true; continue; }
      if (inList && line.startsWith('-')) {
        const ticker = line.substring(1).trim();
        if (ticker) tickers.push(ticker);
      }
    }
    return tickers;
  }

  // YAML 生成 (tickers: の下に - TICKER を並べる)
  function buildYaml(tickers) {
    let yaml = '# 監視銘柄リスト\n';
    yaml += '# 追加したい銘柄はここに追記してください（CIKがcik_lookup.csvに存在する必要あり）\n';
    yaml += 'tickers:\n';
    tickers.forEach(t => yaml += `  - ${t}\n`);
    return yaml;
  }

  // CSV パース
  function parseCsv(csv) {
    const lines = csv.split('\n');
    const headers = lines[0].split(',');
    const rows = [];
    for (let i=1; i<lines.length; i++) {
      if (!lines[i].trim()) continue;
      const vals = lines[i].split(',');
      const row = {};
      headers.forEach((h, idx) => row[h.trim()] = vals[idx] ? vals[idx].trim() : '');
      rows.push(row);
    }
    return rows;
  }

  // CSV 生成
  function buildCsv(rows) {
    const headers = ['ticker', 'cik', 'name'];
    let csv = headers.join(',') + '\n';
    rows.forEach(r => csv += `${r.ticker},${r.cik},${r.name || ''}\n`);
    return csv;
  }

  // CIK を SEC API から取得 (CORS 対策として cors-anywhere デモを使用、必要に応じて変更)
  async function fetchCikFromSec(ticker) {
    const proxy = 'https://cors-anywhere.herokuapp.com/';
    const url = `https://www.sec.gov/files/company_tickers.json`;
    try {
      const res = await fetch(proxy + url, {
        headers: { 'User-Agent': 'Mozilla/5.0 (compatible; YourApp/1.0; +your@email.com)' }
      });
      if (!res.ok) throw new Error('SEC API 応答エラー');
      const data = await res.json();
      for (let key in data) {
        if (data[key].ticker && data[key].ticker.toUpperCase() === ticker.toUpperCase()) {
          const cik = String(data[key].cik_str).padStart(10, '0');
          return { cik, name: data[key].title };
        }
      }
      throw new Error('CIK が見つかりません');
    } catch (e) {
      console.error(e);
      return null;
    }
  }

  // 最終更新日を summary.json から取得
  async function fetchGlobalLastUpdated() {
    try {
      const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/docs/value-monitor/adjusted_eps_analyzer/data/summary.json?ref=${BRANCH}`;
      const res = await fetch(url, { headers: apiHeaders() });
      if (res.ok) {
        const data = await res.json();
        const content = JSON.parse(atob(data.content.replace(/\n/g, '')));
        return content.last_updated || '不明';
      }
    } catch (e) {}
    return '—';
  }

  // 特定ティッカーの最終更新日 (quarterly.json から)
  async function fetchTickerLastUpdated(ticker) {
    try {
      const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/docs/value-monitor/adjusted_eps_analyzer/data/${ticker}/quarterly.json?ref=${BRANCH}`;
      const res = await fetch(url, { headers: apiHeaders() });
      if (res.ok) {
        const data = await res.json();
        const content = JSON.parse(atob(data.content.replace(/\n/g, '')));
        return content.last_updated || '—';
      }
    } catch (e) {}
    return '—';
  }

  // メイン: データ読み込み
  async function loadData() {
    token = tokenInput.value.trim();
    if (!token) { alert('トークンを入力してください'); return; }

    try {
      // monitor_tickers.yaml を取得
      const { content: yamlContent, sha: yamlSha } = await fetchFileContent('config/monitor_tickers.yaml');
      const tickers = parseYaml(yamlContent);
      // cik_lookup.csv を取得
      const { content: csvContent } = await fetchFileContent('config/cik_lookup.csv');
      const csvRows = parseCsv(csvContent);

      // マップ作成
      const cikMap = {};
      const nameMap = {};
      csvRows.forEach(r => { if (r.ticker) { cikMap[r.ticker.toUpperCase()] = r.cik; nameMap[r.ticker.toUpperCase()] = r.name; } });

      // 各ティッカーの最終更新日を取得 (並列)
      const promises = tickers.map(async t => {
        const last = await fetchTickerLastUpdated(t);
        return { ticker: t, lastUpdated: last };
      });
      const lastUpdatedList = await Promise.all(promises);

      // テーブル描画
      tickerListTbody.innerHTML = '';
      tickerList = tickers;
      lastUpdatedList.forEach(({ ticker, lastUpdated }) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><input type="checkbox" class="ticker-check" value="${ticker}"></td>
          <td><strong>${ticker}</strong></td>
          <td>${cikMap[ticker] || '—'}</td>
          <td>${nameMap[ticker] || '—'}</td>
          <td>${lastUpdated}</td>
          <td><span class="status-badge ${lastUpdated !== '—' ? 'status-ok' : 'status-old'}">${lastUpdated !== '—' ? 'データ有' : '未取得'}</span></td>
        `;
        tickerListTbody.appendChild(row);
      });

      // 全選択チェックボックス
      selectAll.onclick = () => {
        document.querySelectorAll('.ticker-check').forEach(cb => cb.checked = selectAll.checked);
      };

      // グローバル最終更新日
      const globalLast = await fetchGlobalLastUpdated();
      globalLastUpdatedSpan.textContent = globalLast;

      contentDiv.style.display = 'block';
    } catch (err) {
      alert('読み込みエラー: ' + err.message);
    }
  }

  // 選択されたティッカーを取得
  function getSelectedTickers() {
    const checkboxes = document.querySelectorAll('.ticker-check:checked');
    return Array.from(checkboxes).map(cb => cb.value);
  }

  // GitHub Actions を起動 (workflow_dispatch)
  async function triggerUpdate(tickers) {
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/update.yml/dispatches`;
    const body = {
      ref: BRANCH,
      inputs: {
        ticker: tickers.join(',')
      }
    };
    const res = await fetch(url, {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`Dispatch 失敗: ${res.status}`);
  }

  // 更新ボタン
  updateSelectedBtn.onclick = async () => {
    const selected = getSelectedTickers();
    if (selected.length === 0) { alert('銘柄を選択してください'); return; }
    if (!confirm(`以下の銘柄の更新を開始しますか？\n${selected.join(', ')}`)) return;
    try {
      await triggerUpdate(selected);
      alert('更新をリクエストしました。GitHub Actions の完了後、リストを再読込してください。');
    } catch (err) {
      alert('エラー: ' + err.message);
    }
  };

  // CIK 自動取得ボタン
  lookupCikBtn.onclick = async () => {
    const ticker = document.getElementById('newTicker').value.trim().toUpperCase();
    if (!ticker) { alert('ティッカーを入力してください'); return; }
    lookupCikBtn.disabled = true;
    lookupCikBtn.textContent = '取得中...';
    const result = await fetchCikFromSec(ticker);
    if (result) {
      document.getElementById('newCik').value = result.cik;
      document.getElementById('newName').value = result.name || '';
      addResultDiv.innerHTML = `<span class="success">✓ CIK 取得成功</span>`;
    } else {
      addResultDiv.innerHTML = `<span class="error">✗ CIK が見つかりませんでした。手動入力してください。</span>`;
    }
    lookupCikBtn.disabled = false;
    lookupCikBtn.textContent = 'CIK 自動取得';
  };

  // 新規ティッカー追加
  addTickerBtn.onclick = async () => {
    const ticker = document.getElementById('newTicker').value.trim().toUpperCase();
    const cik = document.getElementById('newCik').value.trim();
    const name = document.getElementById('newName').value.trim();

    if (!ticker) { alert('ティッカーは必須です'); return; }
    if (!cik) { alert('CIK がありません。自動取得するか手動で入力してください。'); return; }

    try {
      // 現在の monitor_tickers.yaml を取得
      const { content: yamlContent, sha: yamlSha } = await fetchFileContent('config/monitor_tickers.yaml');
      const tickers = parseYaml(yamlContent);
      if (tickers.includes(ticker)) {
        alert('このティッカーは既に登録されています');
        return;
      }
      tickers.push(ticker);
      const newYaml = buildYaml(tickers);
      await updateFile('config/monitor_tickers.yaml', newYaml, `Add ticker ${ticker}`, yamlSha);

      // cik_lookup.csv を更新
      const { content: csvContent, sha: csvSha } = await fetchFileContent('config/cik_lookup.csv');
      const rows = parseCsv(csvContent);
      rows.push({ ticker, cik, name });
      const newCsv = buildCsv(rows);
      await updateFile('config/cik_lookup.csv', newCsv, `Add CIK for ${ticker}`, csvSha);

      addResultDiv.innerHTML = `<span class="success">✓ ティッカー ${ticker} を追加しました。リストを再読込してください。</span>`;
      document.getElementById('newTicker').value = '';
      document.getElementById('newCik').value = '';
      document.getElementById('newName').value = '';
    } catch (err) {
      addResultDiv.innerHTML = `<span class="error">✗ 追加失敗: ${err.message}</span>`;
    }
  };

  // 再読込
  refreshBtn.onclick = loadData;

  // 読み込みボタン
  loadBtn.onclick = loadData;
</script>
</body>
</html>
