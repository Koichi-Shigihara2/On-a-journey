 The launch of the Robotaxi service and next-generation energy storage products like Megapack 3 and Megablock indicates a strategic pivot towards service-driven and AI-enabled business models, aiming for long-term growth and high-margin opportunities despite near-term revenue fluctuations."}, {"timestamp": "2026-04-04 12:44:19", "ticker": "SOUN", "filing_type": "10-Q", "metrics": {"revenue": {"current": 42049000, "prior": 25094000}, "cfo": {"current": 0, "prior": null}}, "predicted_lag_q": 4, "cluster_name": "High-Margin AI/Enterprise", "comment": "SoundHound AI experienced significant revenue growth of 68% year-over-year in Q3 2025, primarily driven by service subscriptions and recent acquisitions. However, the company reported a substantially larger net loss, largely due to a non-cash adjustment in the fair value of contingent acquisition liabilities. Gross margin declined due to increased amortization of acquired intangible assets from the Amelia and Interactions acquisitions. The company continues its aggressive growth and investment strategy, particularly in M&A, to expand its AI offerings in the enterprise sector. Cash flow from operating activities for the three months ended September 30, 2025 and 2024, is not separately presented in the provided consolidated statements of cash flows."}, {"timestamp": "2026-04-04 12:45:44", "ticker": "PLTR", "filing_type": "10-Q", "metrics": {"revenue": {"current": 1181092000, "prior": 725516000}, "cfo": {"current": 0, "prior": null}}, "predicted_lag_q": 4, "cluster_name": "High-Margin AI/Enterprise", "comment": "Palantir is demonstrating robust growth driven by its enterprise AI platforms (AIP, Gotham, Foundry), particularly with a 121% increase in U.S. commercial revenue. The company maintains strong gross margins (82-84%) and is now consistently profitable, indicating successful market penetration and operational efficiency in high-value government and commercial sectors. Note: Three-month CFO data is not explicitly available in the provided cash flow statement, which only reports nine-month periods."}, {"timestamp": "2026-04-04 12:47:01", "ticker": "SOFI", "filing_type": "10-Q", "metrics": {"revenue": {"current": 961600000, "prior": 697121000}, "cfo": {"current": -2751280000, "prior": -919704000}}, "predicted_lag_q": 4, "cluster_name": "High-Growth Fintech", "comment": "Revenue and CFO show significant growth and a clear trend in operations. Note: CFO is extracted for the nine months ended, as detailed in the cash flow statement."}, {"timestamp": "2026-04-04 12:48:31", "ticker": "TSLA", "filing_type": "10-Q", "metrics": {"revenue": {"current": 28095000000, "prior": 25182000000}, "cfo": {"current": 0, "prior": null}}, "predicted_lag_q": 4, "cluster_name": "High-Margin AI/Enterprise", "comment": "CFO data for the three months ended September 30 for both current and prior periods is not available in the provided document, as the Consolidated Statements of Cash Flows only present data for the nine months ended September 30."}];
        let chart = null;

        // 銘柄リストの作成
        const tickers = [...new Set(rawData.map(d => d.ticker))];
        const selector = document.getElementById('stockSelector');
        tickers.forEach(t => { selector.add(new Option(t, t)); });

        function initChart() {
            const ticker = selector.value;
            const filtered = rawData.filter(d => d.ticker === ticker);
            const latest = filtered[filtered.length - 1];
            // 保存されているラグがあれば反映
            document.getElementById('lagSlider').value = latest.predicted_lag_q || 4;
            updateSimulation();
        }

        function updateSimulation() {
            const ticker = selector.value;
            const lag = parseInt(document.getElementById('lagSlider').value);
            document.getElementById('lagVal').innerText = lag;
            
            const filtered = rawData.filter(d => d.ticker === ticker);
            if (filtered.length === 0) return;

            // --- 1. 実績データの整理 ---
            const labels = filtered.map(d => d.timestamp.split(' ')[0] + ' (' + (d.filing_type || '10-K') + ')');
            
            // 年率換算 (10-Qは4倍)
            const revData = filtered.map(d => {
                let v = d.metrics.revenue.current || 0;
                return (d.filing_type === '10-Q') ? v * 4 : v;
            });
            const cfoData = filtered.map(d => {
                let v = d.metrics.cfo.current || 0;
                return (d.filing_type === '10-Q') ? v * 4 : v;
            });

            // --- 2. 未来予測ロジック (Step 8) ---
            const lastRev = revData[revData.length - 1];
            
            // 直近のまともなCFO（0でないもの）を起点にする
            let lastValidCfo = 0;
            for (let i = cfoData.length - 1; i >= 0; i--) {
                if (cfoData[i] !== 0) { lastValidCfo = cfoData[i]; break; }
            }

            const projLabels = [...labels];
            const projRev = [...revData];
            const projCfo = [...cfoData];

            // ラグ（Q数）に応じて未来を描画
            for (let i = 1; i <= lag; i++) {
                projLabels.push(`Q+${i} (予測)`);
                projRev.push(lastRev * Math.pow(1.05, i)); // 5%成長仮定
                // CFOが徐々にRevenueに追いつく線
                let progress = i / lag;
                projCfo.push(lastValidCfo + (lastRev - lastValidCfo) * progress);
            }

            // --- 3. Runway計算 (Step 3 暫定) ---
            let runwayMsg = "CFOプラス";
            if (lastValidCfo < 0) {
                const burn = Math.abs(lastValidCfo);
                const cashEstimate = lastRev * 0.4; // 売上の40%程度の現預金があると仮定(暫定)
                const months = (cashEstimate / burn) * 12;
                runwayMsg = `推定Runway: 約${months.toFixed(1)}ヶ月`;
            }
            document.getElementById('runwayLabel').innerText = runwayMsg;
            document.getElementById('tickerLabel').innerText = ticker + " Analysis";

            // --- 4. Chart描画 ---
            if (chart) chart.destroy();
            const ctx = document.getElementById('simChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: projLabels,
                    datasets: [
                        {
                            label: 'Revenue (Annualized)',
                            data: projRev,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            fill: true,
                            tension: 0.1
                        },
                        {
                            label: 'CFO (Annualized Projection)',
                            data: projCfo,
                            borderColor: '#10b981',
                            borderDash: [5, 5], // 点線
                            pointRadius: 4,
                            fill: false,
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8', callback: v => '$' + v.toLocaleString() }
                        },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    },
                    plugins: {
                        legend: { labels: { color: '#f8fafc' } }
                    }
                }
            });
        }
        initChart();
    </script>
