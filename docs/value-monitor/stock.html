<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adjusted EPS Analyzer · 銘柄詳細</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    :root {
      --bg:   #0a0d14;
      --sur:  #111520;
      --sur2: #161c2d;
      --bdr:  #1e2840;
      --acc:  #3b82f6;
      --grn:  #10b981;
      --red:  #f43f5e;
      --amb:  #f59e0b;
      --txt:  #e2e8f0;
      --mut:  #64748b;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    .hdr {
      position: fixed; top: 0; left: 0; right: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--bdr);
      z-index: 100;
    }
    .hdr-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .logo {
      font-family: var(--mono); font-size: 14px; font-weight: 700;
      letter-spacing: .12em;
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--txt);
    }
    .logo-dot {
      width: 7px; height: 7px;
      background: var(--acc); border-radius: 50%;
      animation: pdot 2s ease-in-out infinite;
    }
    @keyframes pdot {
      0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,.4); }
      50%      { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
    }
    .nav-links { display: flex; gap: 16px; }
    .nav-links a {
      font-family: var(--mono); font-size: 11px; letter-spacing: .08em;
      color: var(--mut); text-decoration: none;
      border-bottom: 1px solid transparent; padding-bottom: 2px;
    }
    .nav-links a:hover { color: var(--acc); border-bottom-color: var(--acc); }
    .search-row { display: flex; align-items: center; gap: 4px; }
    .search-row input {
      font-family: var(--mono); font-size: 11px;
      background: var(--sur2); border: 1px solid var(--bdr);
      color: var(--txt); padding: 5px 10px; width: 130px;
    }
    .search-row button {
      font-family: var(--mono); font-size: 11px;
      padding: 5px 12px; border: 1px solid var(--bdr);
      background: var(--sur2); color: var(--txt); cursor: pointer;
    }
    .search-row button:hover { border-color: var(--acc); color: var(--acc); }

    /* ── メインレイアウト ── */
    .shell {
      max-width: 1200px; margin: 0 auto;
      padding: 80px 20px 48px;
    }

    /* ── ローディング・エラー ── */
    .spin {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid var(--bdr); border-top-color: var(--acc);
      border-radius: 50%; animation: spin .8s linear infinite; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty {
      color: var(--mut); font-family: var(--mono); font-size: 11px;
      padding: 40px; text-align: center;
    }
    .err-box {
      background: rgba(244,63,94,.12); border: 1px solid rgba(244,63,94,.3);
      color: var(--red); padding: 14px 18px; font-size: 13px;
      margin-bottom: 20px; display: none;
    }

    /* ── 銘柄ヘッダー行 ── */
    .ticker-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; flex-wrap: wrap; gap: 8px;
    }
    .ticker-title {
      font-family: var(--mono); font-size: 28px; font-weight: 700;
    }
    .ticker-meta { display: flex; align-items: center; gap: 10px; }
    .health-badge {
      font-family: var(--mono); font-size: 11px;
      padding: 3px 10px; border-radius: 2px;
    }
    .badge-Excellent,.badge-Good  { background: rgba(16,185,129,.15); color: var(--grn); }
    .badge-Caution                { background: rgba(245,158,11,.15);  color: var(--amb); }
    .badge-Warning                { background: rgba(244,63,94,.15);   color: var(--red); }
    .badge-Error                  { background: rgba(100,116,139,.15); color: var(--mut); }
    .last-updated { font-family: var(--mono); font-size: 10px; color: var(--mut); }

    /* ── メトリクスカード ── */
    .metrics-grid {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
      margin-bottom: 20px;
    }
    @media(max-width:600px){ .metrics-grid { grid-template-columns: repeat(2,1fr); } }
    .metric-card {
      background: var(--sur); border: 1px solid var(--bdr);
      padding: 14px 16px;
    }
    .metric-label {
      font-family: var(--mono); font-size: 9px; letter-spacing: .15em;
      color: var(--mut); text-transform: uppercase; margin-bottom: 8px;
    }
    .metric-val {
      font-family: var(--mono); font-size: 22px; font-weight: 700;
      color: var(--txt);
    }
    .metric-val.green { color: var(--grn); }
    .metric-val.red   { color: var(--red); }

    /* ── タブ ── */
    .tab-bar {
      display: flex; gap: 2px; margin-bottom: 16px;
      background: var(--sur); border: 1px solid var(--bdr);
      padding: 3px; width: fit-content;
    }
    .tab-btn {
      font-family: var(--mono); font-size: 11px; letter-spacing: .06em;
      padding: 5px 16px; cursor: pointer; border: none;
      background: transparent; color: var(--mut);
    }
    .tab-btn.active { background: var(--acc); color: #fff; }
    .tab-btn:hover:not(.active) { color: var(--txt); }

    /* ── 期間ピッカー ── */
    .date-panel {
      background: var(--sur); border: 1px solid var(--bdr);
      padding: 14px 16px; margin-bottom: 16px;
    }
    .date-row { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 12px; margin-bottom: 10px; }
    .date-label { font-family: var(--mono); font-size: 9px; color: var(--mut); margin-bottom: 4px; letter-spacing: .1em; }
    .date-input {
      font-family: var(--mono); font-size: 11px;
      background: var(--sur2); border: 1px solid var(--bdr);
      color: var(--txt); padding: 5px 8px;
    }
    .date-input:focus { outline: none; border-color: var(--acc); }
    .btn-apply {
      font-family: var(--mono); font-size: 11px;
      padding: 5px 16px; background: var(--acc); border: none;
      color: #fff; cursor: pointer;
    }
    .btn-apply:hover { background: #2563eb; }
    .preset-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .preset-btn {
      font-family: var(--mono); font-size: 10px;
      padding: 4px 10px; border: 1px solid var(--bdr);
      background: var(--sur2); color: var(--mut); cursor: pointer;
    }
    .preset-btn:hover { border-color: var(--acc); color: var(--acc); }
    .preset-btn.active-preset { border-color: var(--acc); color: var(--acc); background: rgba(59,130,246,.1); }

    /* ── チャート ── */
    .chart-box {
      background: var(--sur); border: 1px solid var(--bdr);
      padding: 20px; margin-bottom: 16px; position: relative;
      height: 320px;
    }

    /* ── セクション見出し ── */
    .sec {
      font-family: var(--mono); font-size: 9px; letter-spacing: .2em;
      color: var(--mut); text-transform: uppercase;
      margin: 24px 0 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .sec::after { content:''; flex:1; height:1px; background: var(--bdr); }

    /* ── AI分析 ── */
    .ai-box {
      background: var(--sur); border: 1px solid var(--bdr);
      padding: 18px 20px; margin-bottom: 16px;
    }
    .ai-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    }
    .ai-header h3 { font-family: var(--sans); font-size: 15px; font-weight: 600; }
    .ai-tag {
      font-family: var(--mono); font-size: 9px;
      background: var(--sur2); border: 1px solid var(--bdr);
      padding: 2px 7px; color: var(--mut);
    }
    #ai-comment { line-height: 1.7; color: var(--txt); }
    #ai-sources {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--bdr);
      font-size: 12px; color: var(--mut);
    }

    /* ── 調整内訳テーブル ── */
    .adj-box {
      background: var(--sur); border: 1px solid var(--bdr);
      padding: 18px 20px; margin-bottom: 16px;
    }
    .adj-box h3 { font-family: var(--sans); font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .scrollable-adjustments {
      max-height: 600px; overflow-y: auto; padding-right: 4px;
    }
    .scrollable-adjustments::-webkit-scrollbar { width: 6px; }
    .scrollable-adjustments::-webkit-scrollbar-track { background: var(--sur2); }
    .scrollable-adjustments::-webkit-scrollbar-thumb { background: var(--bdr); }

    .q-block { border: 1px solid var(--bdr); margin-bottom: 10px; }
    .q-block-hdr {
      background: var(--sur2); padding: 7px 12px;
      font-family: var(--mono); font-size: 11px; color: var(--mut);
      border-bottom: 1px solid var(--bdr);
    }
    .q-block-body { padding: 12px; }
    /* ★ confidence バー（要件定義書 4.2③） */
    .conf-bar-wrap {
      display: flex; align-items: center; gap: 6px; min-width: 90px;
    }
    .conf-bar-bg {
      flex: 1; height: 6px; background: var(--bdr); border-radius: 3px; overflow: hidden;
    }
    .conf-bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #ef4444, #f59e0b, #22c55e);
      background-size: 200% 100%;
    }
    .conf-val { font-family: var(--mono); font-size: 10px; color: var(--mut); min-width: 26px; }
    /* ★ ウォーターフォール図 */
    .wf-box { background: var(--sur); border: 1px solid var(--bdr); padding: 16px; margin-bottom: 16px; }
    .wf-box h3 { font-family: var(--sans); font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--mut); letter-spacing: .08em; }
    #waterfall-chart { width: 100%; height: 260px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      font-family: var(--mono); font-size: 9px; letter-spacing: .1em;
      color: var(--mut); text-align: left; text-transform: uppercase;
      padding: 0 10px 8px;
    }
    td { padding: 6px 10px; border-top: 1px solid var(--bdr); }
    tr:first-child td { border-top: none; }

    .tag-pill {
      font-family: var(--mono); font-size: 9px;
      background: var(--sur2); border: 1px solid var(--bdr);
      padding: 2px 6px; color: var(--mut); white-space: nowrap;
    }
    .amt-cell { font-family: var(--mono); text-align: right; color: var(--grn); }
  </style>
</head>
<body>
  <!-- ヘッダー -->
  <div class="hdr">
    <div class="hdr-inner">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="AEA" style="height:26px;width:auto;object-fit:contain">
        <span class="logo-dot"></span>
        Adjusted EPS Analyzer
      </a>
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <nav class="nav-links">
          <a href="index.html">ダッシュボード</a>
          <a href="tickers.html">銘柄一覧</a>
        </nav>
        <div class="search-row">
          <input type="text" id="ticker-search" placeholder="ティッカー (例: NVDA)">
          <button onclick="loadTicker()">検索</button>
        </div>
      </div>
    </div>
  </div>

  <div class="shell">
    <!-- ローディング -->
    <div id="loading" class="empty" style="display:none">
      <span class="spin"></span>データを読み込み中...
    </div>

    <!-- エラー -->
    <div id="error" class="err-box">
      データを読み込めませんでした。<a href="#" onclick="loadTicker()" style="color:var(--acc)">再試行</a>
    </div>

    <!-- メインコンテンツ -->
    <div id="content" style="display:none">

      <!-- 銘柄ヘッダー -->
      <div class="ticker-row">
        <div class="ticker-title" id="ticker-title">—</div>
        <div class="ticker-meta">
          <span id="health-badge" class="health-badge badge-Good">Good</span>
          <span class="last-updated" id="last-updated"></span>
        </div>
      </div>

      <!-- メトリクスカード -->
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">GAAP EPS</div>
          <div class="metric-val" id="gaap-eps">$0.0000</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Adjusted EPS</div>
          <div class="metric-val green" id="adj-eps">$0.0000</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">差分</div>
          <div class="metric-val" id="diff">$0.0000</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">YoY成長率</div>
          <div class="metric-val" id="yoy">—</div>
        </div>
      </div>

      <!-- タブ -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-quarterly" onclick="switchTab('quarterly')">四半期</button>
        <button class="tab-btn" id="tab-ttm" onclick="switchTab('ttm')">TTM</button>
      </div>

      <!-- 期間ピッカー -->
      <div class="date-panel">
        <div class="date-row">
          <div>
            <div class="date-label">開始日</div>
            <input type="date" id="start-date" class="date-input">
          </div>
          <div>
            <div class="date-label">終了日</div>
            <input type="date" id="end-date" class="date-input">
          </div>
          <button class="btn-apply" onclick="applyDateRange()">適用</button>
        </div>
        <div class="preset-row">
          <button class="preset-btn" onclick="setPreset('all')">全期間</button>
          <button class="preset-btn" onclick="setPreset('5y')">5年</button>
          <button class="preset-btn" onclick="setPreset('4y')">4年</button>
          <button class="preset-btn" onclick="setPreset('3y')">3年</button>
          <button class="preset-btn" onclick="setPreset('2y')">2年</button>
          <button class="preset-btn" onclick="setPreset('1y')">1年</button>
          <button class="preset-btn" onclick="resetDateRange()">リセット</button>
        </div>
      </div>

      <!-- チャート -->
      <div class="chart-box">
        <canvas id="eps-chart"></canvas>
      </div>

      <!-- AI分析 -->
      <div class="sec">AI 分析</div>
      <div class="ai-box">
        <div class="ai-header">
          <h3>AI分析（選択期間内の最新四半期）</h3>
          <span class="ai-tag">Grok</span>
        </div>
        <div id="ai-comment"></div>
        <div id="ai-sources"></div>
      </div>

      <!-- ウォーターフォール図 -->
      <div class="sec">ウォーターフォール図（最新四半期）</div>
      <div class="wf-box">
        <canvas id="waterfall-chart"></canvas>
      </div>

      <!-- 調整内訳 -->
      <div class="sec">調整内訳（全期間）</div>
      <div class="adj-box">
        <div class="scrollable-adjustments" id="adjustments-accordion"></div>
      </div>

    </div><!-- /#content -->
  </div><!-- /.shell -->

  <script>
    Chart.register(ChartDataLabels);

    let currentTicker = 'TSLA';
    let quarterlyData = null;
    let ttmData = null;
    let chart = null;
    let currentTab = 'quarterly';

    const urlParams = new URLSearchParams(window.location.search);
    const tickerParam = urlParams.get('ticker');
    if (tickerParam) {
      currentTicker = tickerParam.toUpperCase();
      document.getElementById('ticker-search').value = currentTicker;
    }

    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
    }

    async function loadTicker(ticker = null) {
      if (ticker) currentTicker = ticker;
      else currentTicker = document.getElementById('ticker-search').value.trim().toUpperCase();
      if (!currentTicker) return;

      showLoading(true);
      document.getElementById('content').style.display = 'none';
      document.getElementById('error').style.display = 'none';

      try {
        const qResp = await fetch(`data/${currentTicker}/quarterly.json`, { cache: 'no-store' });
        if (!qResp.ok) throw new Error('四半期データが見つかりません');
        quarterlyData = await qResp.json();

        ttmData = null;
        try {
          const tResp = await fetch(`data/${currentTicker}/ttm.json`, { cache: 'no-store' });
          if (tResp.ok) ttmData = await tResp.json();
        } catch (e) {}

        document.getElementById('ticker-title').innerText = currentTicker;
        document.getElementById('last-updated').innerText =
          `最終更新: ${new Date(quarterlyData.last_updated).toLocaleDateString('ja-JP')}`;

        setInitialDateRange(quarterlyData.quarters);

        showLoading(false);
        document.getElementById('content').style.display = 'block';

        switchTab('quarterly');
      } catch (error) {
        console.error('Error:', error);
        showLoading(false);
        document.getElementById('error').style.display = 'block';
      }
    }

    // ★ デフォルト3年、日付境界はUTCずれを避けて文字列比較
    function setInitialDateRange(quarters) {
      if (!quarters || quarters.length === 0) return;
      const dates = quarters.map(q => q.filing_date).sort();
      document.getElementById('start-date').value = dates[0];
      document.getElementById('end-date').value = dates[dates.length - 1];
      setPreset('3y');
    }

    // ★ 文字列(YYYY-MM-DD)比較でUTCずれを排除
    function filterDataByDateRange(dataArray, labelField, startStr, endStr) {
      if (!dataArray || dataArray.length === 0) return [];
      return dataArray.filter(item => {
        const d = (item[labelField] || '').substring(0, 10);
        if (startStr && d < startStr) return false;
        if (endStr   && d > endStr)   return false;
        return true;
      });
    }

    function applyDateRange() {
      if (!quarterlyData) return;
      const startDate = document.getElementById('start-date').value;
      const endDate   = document.getElementById('end-date').value;
      if (!startDate || !endDate) return;

      const filtered = filterDataByDateRange(quarterlyData.quarters, 'filing_date', startDate, endDate);

      if (currentTab === 'quarterly') {
        updateChart(filtered, 'quarterly', 'filing_date');
        const latest = getLatestFromArray(filtered);
        if (latest) {
          updateMetricsWithQuarter(JSON.parse(JSON.stringify(latest)), quarterlyData.quarters);
          updateAI(latest.ai_analysis);
          updateWaterfall(latest);  // ★ ウォーターフォール図
        } else {
          resetMetrics(); updateAI(null);
          updateWaterfall(null);
        }
      } else if (currentTab === 'ttm') {
        if (ttmData && ttmData.ttm && ttmData.ttm.length > 0) {
          const filteredTTM = ttmData.ttm.filter(item => {
            const d = (item.period.split(' to ')[1] || '').substring(0, 10);
            return d >= startDate && d <= endDate;
          });
          updateChart(filteredTTM, 'ttm', 'period');
        } else {
          updateChart([], 'ttm', '');
        }
      }
    }

    function setPreset(range) {
      if (!quarterlyData) return;
      const dates = quarterlyData.quarters.map(q => q.filing_date).sort();
      const maxDate = dates[dates.length - 1];
      let startDate;

      // setFullYear はmutable なので毎回 new Date() を作る
      const maxObj = () => new Date(maxDate + 'T00:00:00');

      switch (range) {
        case 'all': startDate = dates[0]; break;
        case '5y': { const d = maxObj(); d.setFullYear(d.getFullYear()-5); startDate = d.toISOString().split('T')[0]; break; }
        case '4y': { const d = maxObj(); d.setFullYear(d.getFullYear()-4); startDate = d.toISOString().split('T')[0]; break; }
        case '3y': { const d = maxObj(); d.setFullYear(d.getFullYear()-3); startDate = d.toISOString().split('T')[0]; break; }
        case '2y': { const d = maxObj(); d.setFullYear(d.getFullYear()-2); startDate = d.toISOString().split('T')[0]; break; }
        case '1y': { const d = maxObj(); d.setFullYear(d.getFullYear()-1); startDate = d.toISOString().split('T')[0]; break; }
        default: return;
      }
      if (startDate < dates[0]) startDate = dates[0];

      document.getElementById('start-date').value = startDate;
      document.getElementById('end-date').value = maxDate;

      // アクティブなプリセットボタンを強調
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active-preset'));
      const activeBtn = [...document.querySelectorAll('.preset-btn')].find(b =>
        b.getAttribute('onclick') === `setPreset('${range}')`);
      if (activeBtn) activeBtn.classList.add('active-preset');

      applyDateRange();
    }

    function resetDateRange() {
      if (!quarterlyData) return;
      const dates = quarterlyData.quarters.map(q => q.filing_date).sort();
      document.getElementById('start-date').value = dates[0];
      document.getElementById('end-date').value = dates[dates.length - 1];
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active-preset'));
      applyDateRange();
    }

    function getLatestFromArray(arr) {
      if (!arr || arr.length === 0) return null;
      return [...arr].sort((a,b) => b.filing_date.localeCompare(a.filing_date))[0];
    }

    function calculateYoY(latest, allQuarters) {
      const [year, month] = latest.filing_date.split('-');
      const latestQ = Math.floor((parseInt(month)-1)/3)+1;
      const targetYear = parseInt(year)-1;
      const candidates = allQuarters.filter(q => {
        const qY = parseInt(q.filing_date.split('-')[0]);
        const qM = parseInt(q.filing_date.split('-')[1]);
        return qY === targetYear && Math.floor((qM-1)/3)+1 === latestQ;
      });
      if (candidates.length > 0) {
        const prev = candidates.reduce((a,b) =>
          Math.abs(new Date(latest.filing_date)-new Date(a.filing_date)) <
          Math.abs(new Date(latest.filing_date)-new Date(b.filing_date)) ? a : b);
        if (Math.abs(prev.adjusted_eps) > 0.0001)
          return (latest.adjusted_eps - prev.adjusted_eps) / Math.abs(prev.adjusted_eps);
      }
      const idx = allQuarters.findIndex(q => q.filing_date === latest.filing_date);
      if (idx >= 4) {
        const prevEps = allQuarters[idx-4].adjusted_eps;
        if (Math.abs(prevEps) > 0.0001) return (latest.adjusted_eps - prevEps) / Math.abs(prevEps);
      }
      return null;
    }

    function updateMetricsWithQuarter(q, allQuarters) {
      document.getElementById('gaap-eps').innerText = `$${q.gaap_eps.toFixed(4)}`;
      document.getElementById('adj-eps').innerText  = `$${q.adjusted_eps.toFixed(4)}`;
      const diff = q.adjusted_eps - q.gaap_eps;
      const diffEl = document.getElementById('diff');
      diffEl.innerText = `$${diff.toFixed(4)}`;
      diffEl.className = 'metric-val ' + (diff >= 0 ? 'green' : 'red');
      const yoy = calculateYoY(q, allQuarters);
      const yoyEl = document.getElementById('yoy');
      if (yoy !== null) {
        yoyEl.innerText = (yoy*100).toFixed(1)+'%';
        yoyEl.className = 'metric-val ' + (yoy >= 0 ? 'green' : 'red');
      } else {
        yoyEl.innerText = '—'; yoyEl.className = 'metric-val';
      }
    }

    function resetMetrics() {
      ['gaap-eps','adj-eps','diff','yoy'].forEach(id => {
        document.getElementById(id).innerText = id === 'yoy' ? '—' : '$0.0000';
        document.getElementById(id).className = 'metric-val';
      });
    }

    function updateAI(ai) {
      const badge     = document.getElementById('health-badge');
      const commentEl = document.getElementById('ai-comment');
      const sourcesEl = document.getElementById('ai-sources');
      if (!ai) {
        badge.innerText   = 'Good';
        badge.className   = 'health-badge badge-Good';
        commentEl.innerHTML = '<span style="color:var(--mut)">分析コメント準備中</span>';
        sourcesEl.innerHTML = '';
        return;
      }
      const h = ai.health || 'Good';
      badge.innerText = h;
      badge.className = `health-badge badge-${h}`;
      commentEl.innerHTML = `<p>${ai.comment || '分析コメント準備中'}</p>`;
      if (ai.sources && ai.sources.length) {
        let s = '<div style="font-family:var(--mono);font-size:10px;color:var(--mut);margin-bottom:6px">引用ソース:</div><ul style="list-style:disc;padding-left:20px;line-height:1.8">';
        ai.sources.forEach(src => {
          const conf = (src.confidence != null) ? src.confidence : null;
          const confHtml = conf != null ? `
            <span class="conf-bar-wrap" title="一過性確信度: ${(conf*100).toFixed(0)}%">
              <span class="conf-bar-bg"><span class="conf-bar-fill" style="width:${(conf*100).toFixed(0)}%;background-position:${((1-conf)*100).toFixed(0)}% 0"></span></span>
              <span class="conf-val">${(conf*100).toFixed(0)}%</span>
            </span>` : '';
          s += `<li style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="color:var(--acc);font-family:var(--mono);font-size:11px">${src.item}:</span>
            <span>${src.snippet}</span>${confHtml}
          </li>`;
        });
        sourcesEl.innerHTML = s + '</ul>';
      } else {
        sourcesEl.innerHTML = '';
      }
    }

    function formatLabel(dateStr, item) {
      if (!dateStr) return '';
      // ★ fiscal_year + quarter が存在する場合はそちらを優先（決算期末日ベース）
      if (item && item.fiscal_year && item.quarter) {
        return `${item.fiscal_year}-Q${item.quarter}`;
      }
      // ★ period_end が存在する場合は period_end の月からQ番号を計算
      const base = (item && item.period_end) ? item.period_end : dateStr;
      const [year, month] = base.split('-');
      return `${year}-Q${Math.floor((parseInt(month)-1)/3)+1}`;
    }

    function updateChart(dataArray, type, labelField) {
      const canvas = document.getElementById('eps-chart');
      const ctx = canvas.getContext('2d');
      if (chart) { chart.destroy(); chart = null; }
      if (!dataArray || dataArray.length === 0) return;

      const sorted = [...dataArray].sort((a,b) => a[labelField].localeCompare(b[labelField]));
      const labels = sorted.map(item => formatLabel(
        type === 'ttm' ? item.period.split(' to ')[1] : item[labelField],
        type === 'ttm' ? null : item
      ));
      const gaapData = sorted.map(item => type === 'quarterly' ? item.gaap_eps : item.eps);
      const adjData  = sorted.map(item => item.adjusted_eps);

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'GAAP EPS', data: gaapData,
              borderColor: '#94a3b8', backgroundColor: 'rgba(148,163,184,.08)',
              tension: 0.15, pointRadius: 3,
              datalabels: {
                align: 'top', offset: 4,
                color: '#94a3b8', font: { family: "'Space Mono'", size: 9 },
                formatter: v => v.toFixed(2),
                backgroundColor: 'rgba(10,13,20,.7)', borderRadius: 2,
                padding: { top:1,bottom:1,left:3,right:3 }
              }
            },
            {
              label: 'Adjusted EPS', data: adjData,
              borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,.08)',
              tension: 0.15, pointRadius: 3,
              datalabels: {
                align: 'bottom', offset: 4,
                color: '#10b981', font: { family: "'Space Mono'", size: 9 },
                formatter: v => v.toFixed(2),
                backgroundColor: 'rgba(10,13,20,.7)', borderRadius: 2,
                padding: { top:1,bottom:1,left:3,right:3 }
              }
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: '#94a3b8', font: { family: "'Space Mono'", size: 11 }, boxWidth: 14 } },
            datalabels: { display: true }
          },
          scales: {
            y: { grid: { color: 'rgba(30,40,64,.8)' }, ticks: { color: '#64748b', font: { family: "'Space Mono'", size: 10 } }, beginAtZero: false },
            x: { grid: { color: 'rgba(30,40,64,.8)' }, ticks: { color: '#64748b', font: { family: "'Space Mono'", size: 10 }, maxRotation: 45, autoSkip: true } }
          }
        }
      });
    }

    // ★ ウォーターフォール図（要件定義書 4.1）
    let wfChart = null;
    function updateWaterfall(quarter) {
      const canvas = document.getElementById('waterfall-chart');
      if (!canvas) return;
      if (wfChart) { wfChart.destroy(); wfChart = null; }
      if (!quarter) return;

      const gaap = quarter.gaap_net_income || 0;
      const adjs = quarter.adjustments || [];
      const adjTotal = quarter.net_adjustment_total || 0;
      const adjusted = quarter.adjusted_net_income || (gaap + adjTotal);
      const shares = quarter.diluted_shares_used || 1;

      // ラベルと値の構築（単位：百万ドル）
      const toM = v => v / 1e6;
      const labels = ['GAAP純利益'];
      const starts = [0];       // 積み上げ開始位置
      const values = [toM(gaap)]; // バーの高さ
      const colors = [];

      // GAAP EPS バー色
      colors.push(gaap >= 0 ? 'rgba(148,163,184,0.85)' : 'rgba(239,68,68,0.85)');

      // 各調整項目
      let running = toM(gaap);
      adjs.forEach(adj => {
        const amt = toM(adj.net_amount || 0);
        if (Math.abs(amt) < 0.1) return; // 0.1M未満は省略
        labels.push(adj.item_name || adj.item_id || '');
        starts.push(running);
        values.push(amt);
        colors.push(amt >= 0 ? 'rgba(52,211,153,0.85)' : 'rgba(239,68,68,0.85)');
        running += amt;
      });

      // Adjusted EPS バー（合計）
      labels.push('Adjusted純利益');
      starts.push(0);
      values.push(toM(adjusted));
      colors.push('rgba(56,189,248,0.9)');

      const ctx = canvas.getContext('2d');
      wfChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            // 透明な積み上げベース
            {
              data: starts.map((s, i) => i === labels.length - 1 ? 0 : s),
              backgroundColor: 'transparent',
              borderColor: 'transparent',
              stack: 'wf'
            },
            // 実際の値バー
            {
              data: values,
              backgroundColor: colors,
              borderColor: colors.map(c => c.replace('0.85','1').replace('0.9','1')),
              borderWidth: 1,
              stack: 'wf',
              datalabels: {
                display: true,
                color: '#e2e8f0',
                font: { family: "'Space Mono'", size: 9 },
                formatter: v => v >= 0 ? `+$${v.toFixed(0)}M` : `-$${Math.abs(v).toFixed(0)}M`,
                anchor: v => v >= 0 ? 'end' : 'start',
                align: v => v >= 0 ? 'top' : 'bottom',
                offset: 2
              }
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const v = ctx.datasetIndex === 1 ? ctx.raw : null;
                  if (v === null) return '';
                  return `$${v.toFixed(1)}M`;
                }
              }
            },
            datalabels: { display: ctx => ctx.datasetIndex === 1 }
          },
          scales: {
            x: {
              stacked: true,
              ticks: { color: '#94a3b8', font: { family: "'Space Mono'", size: 9 }, maxRotation: 30 },
              grid: { color: 'rgba(255,255,255,0.05)' }
            },
            y: {
              stacked: true,
              ticks: { color: '#94a3b8', font: { family: "'Space Mono'", size: 9 },
                callback: v => `$${v.toFixed(0)}M` },
              grid: { color: 'rgba(255,255,255,0.05)' }
            }
          }
        }
      });
    }

    function updateAllAdjustments(quarters) {
      const container = document.getElementById('adjustments-accordion');
      const sorted = [...quarters].sort((a,b) => b.filing_date.localeCompare(a.filing_date));
      let html = '';
      sorted.forEach(q => {
        html += `<div class="q-block">`;
        html += `<div class="q-block-hdr">${q.filing_date}</div>`;
        if (q.adjustments && q.adjustments.length > 0) {
          html += `<div class="q-block-body"><table>
            <thead><tr>
              <th>項目</th><th style="text-align:right">金額（税後）</th><th>理由</th><th>抽出元</th><th title="一過性確信度（AI判定）">確信度</th>
            </tr></thead><tbody>`;
          q.adjustments.forEach(item => {
            // ★ ai_analysis.sources から該当項目の confidence を取得
            const aiSources = (q.ai_analysis && q.ai_analysis.sources) ? q.ai_analysis.sources : [];
            // ★ item_name（日本語）またはitem_id（英語）どちらでも照合
            const srcMatch = aiSources.find(s => s.item === item.item_name || s.item === item.item_id);
            const conf = srcMatch && srcMatch.confidence != null ? srcMatch.confidence : null;
            const confHtml = conf != null
              ? `<span class="conf-bar-wrap" title="一過性確信度: ${(conf*100).toFixed(0)}%">
                   <span class="conf-bar-bg"><span class="conf-bar-fill" style="width:${(conf*100).toFixed(0)}%;background-position:${((1-conf)*100).toFixed(0)}% 0"></span></span>
                   <span class="conf-val">${(conf*100).toFixed(0)}%</span>
                 </span>`
              : '<span style="color:var(--mut);font-size:10px">-</span>';
            html += `<tr>
              <td>${item.item_name}</td>
              <td class="amt-cell">+$${(item.net_amount/1e6).toFixed(1)}M</td>
              <td>${item.reason || ''}</td>
              <td><span class="tag-pill">${item.extracted_from || ''}</span></td>
              <td>${confHtml}</td>
            </tr>`;
          });
          html += `</tbody></table></div>`;
        } else {
          html += `<div class="q-block-body" style="color:var(--mut)">この四半期には調整項目はありません。</div>`;
        }
        html += `</div>`;
      });
      container.innerHTML = html;
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      if (!currentTicker) return;
      if (tab === 'quarterly' && quarterlyData) {
        applyDateRange();
        updateAllAdjustments(quarterlyData.quarters);
      } else if (tab === 'ttm') {
        if (!ttmData || !ttmData.ttm || ttmData.ttm.length === 0) {
          updateChart([], 'ttm', '');
          document.getElementById('adjustments-accordion').innerHTML = '<div style="color:var(--mut)">TTMデータには調整内訳はありません。</div>';
          document.getElementById('ai-comment').innerHTML = '<span style="color:var(--mut)">TTMデータにはAI分析はありません。</span>';
          document.getElementById('ai-sources').innerHTML = '';
        } else {
          const startDate = document.getElementById('start-date').value;
          const endDate   = document.getElementById('end-date').value;
          const filteredTTM = ttmData.ttm.filter(item => {
            const d = (item.period.split(' to ')[1] || '').substring(0, 10);
            return d >= startDate && d <= endDate;
          });
          updateChart(filteredTTM, 'ttm', 'period');
          document.getElementById('adjustments-accordion').innerHTML = '<div style="color:var(--mut)">TTMデータには調整内訳はありません。</div>';
          document.getElementById('ai-comment').innerHTML = '<span style="color:var(--mut)">TTMデータにはAI分析はありません。</span>';
          document.getElementById('ai-sources').innerHTML = '';
        }
      }
    }

    window.onload = () => loadTicker();
  </script>
</body>
</html>
