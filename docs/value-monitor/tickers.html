<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>銘柄一覧 - Adjusted EPS Analyzer</title>
  <!-- フォント (MACRO PULSE と同じ) -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- DataTables CSS -->
  <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
  <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css">
  <style>
    :root {
      --bg: #0a0d14;
      --sur: #111520;
      --sur2: #161c2d;
      --bdr: #1e2840;
      --acc: #3b82f6;
      --grn: #10b981;
      --red: #f43f5e;
      --amb: #f59e0b;
      --txt: #e2e8f0;
      --mut: #64748b;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
    }
    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 48px;
    }
    /* ヘッダー */
    header {
      border-bottom: 1px solid var(--bdr);
      padding: 16px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .15em;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-dot {
      width: 8px;
      height: 8px;
      background: var(--acc);
      border-radius: 50%;
      animation: pdot 2s ease-in-out infinite;
    }
    @keyframes pdot {
      0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,.4); }
      50% { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
    }
    .hdr-r {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .nav-links {
      display: flex;
      gap: 16px;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--mut);
      text-decoration: none;
      letter-spacing: .08em;
      padding: 5px 0;
      border-bottom: 1px solid transparent;
    }
    .nav-links a:hover {
      color: var(--acc);
      border-bottom-color: var(--acc);
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .search-box input {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--sur2);
      border: 1px solid var(--bdr);
      padding: 5px 10px;
      color: var(--txt);
      width: 120px;
    }
    .search-box button {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border: 1px solid var(--bdr);
      background: var(--sur2);
      color: var(--txt);
      cursor: pointer;
    }
    .search-box button:hover {
      border-color: var(--acc);
      color: var(--acc);
    }
    /* DataTables のカスタマイズ */
    .dataTables_wrapper .dataTables_length,
    .dataTables_wrapper .dataTables_filter,
    .dataTables_wrapper .dataTables_info,
    .dataTables_wrapper .dataTables_paginate {
      color: var(--txt) !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button {
      color: var(--txt) !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button.current {
      background: var(--acc) !important;
      color: white !important;
    }
    table.dataTable tbody tr {
      background-color: var(--sur) !important;
    }
    table.dataTable tbody td {
      color: var(--txt) !important;
    }
    table.dataTable thead th {
      background-color: var(--sur2) !important;
      color: var(--txt) !important;
    }
    .dt-button {
      background: var(--acc) !important;
      color: white !important;
      border-radius: 0.375rem !important;
      padding: 0.25rem 0.75rem !important;
      margin: 0 0.25rem !important;
    }
    .dt-button:hover {
      background: var(--acc) !important;
      opacity: 0.8;
    }
    /* 健全性バッジ */
    .health-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 2px;
    }
    .health-Excellent, .health-Good {
      background: rgba(16,185,129,.15);
      color: var(--grn);
    }
    .health-Caution {
      background: rgba(245,158,11,.15);
      color: var(--amb);
    }
    .health-Warning {
      background: rgba(244,63,94,.15);
      color: var(--red);
    }
    .health-Error {
      background: rgba(100,116,139,.15);
      color: var(--mut);
    }
    .number {
      font-family: var(--mono);
      text-align: right;
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">
      <img src="images/logo.png" alt="TANUKI" style="height:30px; width:auto; object-fit:contain">
      <span class="logo-dot"></span>
      Adjusted EPS Analyzer
    </div>
    <div class="hdr-r">
      <div class="nav-links">
        <a href="index.html" id="nav-dashboard">ダッシュボード</a>
        <a href="tickers.html" id="nav-tickers">銘柄一覧</a>
      </div>
      <div class="search-box">
        <input type="text" id="ticker-search" placeholder="ティッカー (例: TSLA)" value="TSLA">
        <button onclick="window.location.href='stock.html?ticker='+document.getElementById('ticker-search').value.toUpperCase()">検索</button>
      </div>
    </div>
  </header>

  <h2 class="sec" style="margin-top:0;">📋 全監視銘柄一覧</h2>
  <div class="table-wrap">
    <table id="tickers-table" class="display" style="width:100%">
      <thead>
        <tr>
          <th>ティッカー</th>
          <th>会社名</th>
          <th>最新決算日</th>
          <th>GAAP EPS</th>
          <th>Adjusted EPS</th>
          <th>YoY成長率</th>
          <th>健全性</th>
        </tr>
      </thead>
    </table>
  </div>
</div>

<!-- スクリプト -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
<script>
  $(document).ready(function() {
    $('#tickers-table').DataTable({
      ajax: {
        url: 'data/summary.json',
        dataSrc: 'tickers'
      },
      columns: [
        {
          data: 'ticker',
          render: function(data) {
            return '<a href="stock.html?ticker=' + data + '" style="color:var(--acc);">' + data + '</a>';
          }
        },
        { data: 'company_name' },
        { data: 'latest_filing_date' },
        {
          data: 'gaap_eps',
          render: data => data !== null ? '$' + data.toFixed(4) : '—',
          className: 'number'
        },
        {
          data: 'adjusted_eps',
          render: data => data !== null ? '$' + data.toFixed(4) : '—',
          className: 'number'
        },
        {
          data: 'yoy_growth',
          render: function(data) {
            if (data === null) return '—';
            const pct = (data * 100).toFixed(1) + '%';
            const color = data >= 0 ? 'var(--grn)' : 'var(--red)';
            return '<span style="color:' + color + ';">' + pct + '</span>';
          },
          className: 'number'
        },
        {
          data: 'health',
          render: function(data) {
            const health = data || 'Good';
            let cls = 'health-';
            if (health === 'Excellent' || health === 'Good') cls += 'Good';
            else if (health === 'Caution') cls += 'Caution';
            else if (health === 'Warning') cls += 'Warning';
            else cls += 'Error';
            return '<span class="health-badge ' + cls + '">' + health + '</span>';
          }
        }
      ],
      layout: {
        topStart: {
          buttons: ['copyHtml5', 'excelHtml5', 'csvHtml5']
        }
      },
      order: [[0, 'asc']],
      pageLength: 25,
      language: {
        url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/ja.json'
      }
    });
  });

  // アクティブなリンクをハイライト
  document.addEventListener('DOMContentLoaded', function() {
    const navTickers = document.getElementById('nav-tickers');
    if (navTickers) {
      navTickers.style.color = 'var(--acc)';
      navTickers.style.borderBottomColor = 'var(--acc)';
    }
  });

  // ヘッダーの検索ボックスでEnter押下時にも動作
  document.getElementById('ticker-search').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      window.location.href = 'stock.html?ticker=' + this.value.toUpperCase();
    }
  });
</script>
</body>
</html>
