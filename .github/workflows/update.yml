name: Update EPS Data

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: '更新するティッカー（カンマ区切り、空の場合は全銘柄）'
        required: false
        default: ''
  schedule:
    - cron: '0 10 * * 1'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TICKERS: ${{ github.event.inputs.tickers }}
        run: |
          # TICKERS が指定されていればそれだけ処理、なければ全銘柄
          python src/pipeline.py --tickers "$TICKERS"

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain docs/data/)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/data/
          git commit -m "Update EPS data - $(date +'%Y-%m-%d')"
          git push
