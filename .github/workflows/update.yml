name: Update EPS Data

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: '更新する銘柄（例: AMZN または AMZN,AMD,APP）。カンマ区切りで複数指定可。空欄の場合は全銘柄を更新'
        required: false
        default: ''
  schedule:
    - cron: '0 10 * * 1'  # 毎週月曜日10:00 UTC

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          HTTP2: "0"
        run: |
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            python -m value.adjusted_eps_analyzer.pipeline --ticker ${{ github.event.inputs.ticker }}
          else
            python -m value.adjusted_eps_analyzer.pipeline
          fi

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain docs/data/)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/data/
          git commit -m "Update EPS data - $(date +'%Y-%m-%d')"
          git push
