- name: Setup Python
  uses: actions/setup-python@v4
  with:
    python-version: '3.10'

- name: Upgrade all dependencies
  run: |
    pip install --upgrade pip setuptools wheel
    pip install --upgrade urllib3 requests pyopenssl cryptography certifi
    pip install --upgrade httpx httpcore

- name: Install project dependencies
  run: |
    pip install -r requirements.txt

- name: Verify installations
  run: |
    python -c "import urllib3; print(f'urllib3: {urllib3.__version__}')"
    python -c "import httpx; print(f'httpx: {httpx.__version__}')"

- name: Run pipeline
  env:
    XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
    HTTP2: "0"
    HTTPX_HTTP2: "0"           # ← httpx専用の設定
    REQUESTS_CA_BUNDLE: "/etc/ssl/certs/ca-certificates.crt"
    SSL_CERT_FILE: "/etc/ssl/certs/ca-certificates.crt"
  run: |
    python src/pipeline.py
