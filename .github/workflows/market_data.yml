name: Market Data Collection

on:
  schedule:
    - cron: '30 10 * * *'   # 毎日19:30 JST
  workflow_dispatch:

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance feedparser requests

      - name: Run data collection and email
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python src/market-monitor/collect_and_send.py

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/market-monitor/data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update market data $(date '+%Y-%m-%d')"
          git push
