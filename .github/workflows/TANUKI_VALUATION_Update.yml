name: TANUKI VALUATION Daily Update

on:
  schedule:
    - cron: '0 14 * * 1-5'  # UTC 14:00 (JST 23:00) 平日のみ
  workflow_dispatch:
    inputs:
      tickers:
        description: '対象ティッカー（カンマ区切り、空白で全て）'
        required: false
        default: ''

env:
  TZ: Asia/Tokyo

jobs:
  update-valuations:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: kaihatsu

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install yfinance numpy requests pyyaml

      - name: Update SEC XBRL data
        env:
          SEC_USER_AGENT_EMAIL: ${{ secrets.SEC_USER_AGENT_EMAIL }}
        run: |
          # 対象ティッカーを決定
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            TICKERS=$(echo "${{ github.event.inputs.tickers }}" | tr ',' ' ')
          else
            # monitor_tickers.yamlから全銘柄を取得
            TICKERS=$(python -c "
import yaml
with open('config/monitor_tickers.yaml') as f:
    data = yaml.safe_load(f)
print(' '.join(data.get('tickers', [])))
")
          fi
          echo "SECデータ更新対象: $TICKERS"
          python common/sec_data/update.py $TICKERS

      - name: Run TANUKI VALUATION Pipeline
        working-directory: src/value/tanuki_valuation
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            TICKERS=$(echo "${{ github.event.inputs.tickers }}" | tr ',' ' ')
            python pipeline.py $TICKERS
          else
            python pipeline.py
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add docs/value-monitor/tanuki_valuation/data/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🦝 TANUKI VALUATION: $(date +'%Y-%m-%d %H:%M') JST"
            git push origin kaihatsu
          fi

      - name: Summary
        run: |
          echo "## 🦝 TANUKI VALUATION 更新完了" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| ティッカー | 理論株価 | 検証 |" >> $GITHUB_STEP_SUMMARY
          echo "|:-----------|:---------|:-----|" >> $GITHUB_STEP_SUMMARY
          for f in docs/value-monitor/tanuki_valuation/data/*/latest.json; do
            ticker=$(basename $(dirname $f))
            value=$(cat $f | python -c "import sys,json; d=json.load(sys.stdin); print(f\"{d.get('intrinsic_value_per_share', 0):.2f}\")" 2>/dev/null || echo "N/A")
            validation=$(cat $f | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('validation',{}).get('overall','--'))" 2>/dev/null || echo "--")
            echo "| $ticker | \$$value | $validation |" >> $GITHUB_STEP_SUMMARY
          done
