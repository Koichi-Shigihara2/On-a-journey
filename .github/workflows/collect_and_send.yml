name: Market Pulse Data Update

on:
  schedule:
    # 毎日 08:00 JST（前日データ取得）
    - cron: "0 23 * * *"
  workflow_dispatch:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Run collect_and_send
        env:
          XAI_API_KEY:     ${{ secrets.XAI_API_KEY }}
          GMAIL_USER:      ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_PASSWORD }}
        run: |
          python src/market/market_pulse/collect_and_send.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/market-monitor/data/
          git diff --staged --quiet || git commit -m "chore: auto-update market pulse data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin ${{ github.ref_name }}
          git push
