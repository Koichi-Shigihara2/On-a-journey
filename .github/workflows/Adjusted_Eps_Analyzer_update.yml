name: Adjusted_EPS_Data_Update

on:
  workflow_dispatch:
    branches:
      - kaihatsu
    inputs:
      ticker:
        description: '更新する銘柄（例: AMZN または AMZN,AMD,APP）。カンマ区切りで複数指定可。空欄の場合は全銘柄を更新'
        required: false
        default: ''
  schedule:
    - cron: '0 10 * * 1'  # 毎週月曜日10:00 UTC

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # タイムアウト設定を追加
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: kaihatsu

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          echo "=== Pipeline Start ==="
          echo "Ticker input: '${{ github.event.inputs.ticker }}'"
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            python -m src.value.adjusted_eps_analyzer.pipeline --ticker "${{ github.event.inputs.ticker }}"
          else
            python -m src.value.adjusted_eps_analyzer.pipeline
          fi
          echo "=== Pipeline End ==="

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain docs/value-monitor/adjusted_eps_analyzer/data/)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/value-monitor/adjusted_eps_analyzer/data/
          git commit -m "Update EPS data - $(date +'%Y-%m-%d')"
          git pull --rebase origin kaihatsu
          git push origin kaihatsu
