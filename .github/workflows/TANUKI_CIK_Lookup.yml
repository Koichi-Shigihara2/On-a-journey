name: TANUKI CIK Lookup

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'ティッカーシンボル（例: KO）'
        required: true
        type: string

jobs:
  cik-lookup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: kaihatsu

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Lookup CIK from SEC
        id: lookup
        run: |
          python - <<'EOF'
          import os
          import csv
          import json
          import requests

          ticker = os.environ.get("TICKER", "").strip().upper()
          sec_email = os.environ.get("SEC_USER_AGENT_EMAIL", "")
          csv_path = "config/cik_lookup.csv"
          result_path = "config/cik_lookup_result.json"

          def write_result(data: dict):
              os.makedirs(os.path.dirname(result_path), exist_ok=True)
              with open(result_path, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          def clean_key(k):
              """BOM・空白を除去したキーを返す"""
              return k.lstrip('\ufeff').strip() if k else ''

          # ── 既存CSVを読み込む（BOM対応・ヘッダー保持） ──
          rows = []
          existing_tickers = set()
          fieldnames = ["ticker", "cik", "name"]  # フォールバック

          try:
              with open(csv_path, newline='', encoding='utf-8') as f:
                  reader = csv.DictReader(f)
                  raw_fn = reader.fieldnames or []

                  # BOM除去・空列除去してfieldnamesを確定
                  fieldnames = [clean_key(fn) for fn in raw_fn if clean_key(fn)]
                  print(f"[INFO] CSVヘッダー: {fieldnames}")

                  for row in reader:
                      # キーのBOM・空白を除去しながら読み込む
                      clean_row = {clean_key(k): v for k, v in row.items() if clean_key(k)}
                      rows.append(clean_row)
                      existing_tickers.add(clean_row.get('ticker', '').upper())

              print(f"[INFO] 既存行数: {len(rows)}")

          except FileNotFoundError:
              print(f"[INFO] {csv_path} が存在しないため新規作成します")

          if ticker in existing_tickers:
              print(f"[SKIP] {ticker} は既にcik_lookup.csvに存在します")
              write_result({"ticker": ticker, "status": "already_exists"})
              exit(0)

          # ── SEC company_tickers.json から CIK を取得 ──
          print(f"[INFO] SEC APIからCIKを取得中: {ticker}")
          user_agent = f"Koichi-Shigihara2 On-a-journey {sec_email}"
          headers = {
              "User-Agent": user_agent,
              "Accept": "application/json",
              "Accept-Encoding": "gzip, deflate"
          }
          print(f"[INFO] User-Agent: Koichi-Shigihara2 On-a-journey ***")

          try:
              res = requests.get(
                  "https://www.sec.gov/files/company_tickers.json",
                  headers=headers,
                  timeout=30
              )
              if res.status_code == 403:
                  raise Exception(
                      "403 Forbidden: SEC_USER_AGENT_EMAIL Secretが未設定か無効です。"
                  )
              res.raise_for_status()
              data = res.json()
          except Exception as e:
              print(f"[ERROR] SEC API取得失敗: {e}")
              write_result({"ticker": ticker, "status": "api_error", "error": str(e)})
              exit(1)

          cik = None
          name = None
          for entry in data.values():
              if entry.get("ticker", "").upper() == ticker:
                  cik = str(entry["cik_str"]).zfill(10)
                  name = entry.get("title", "")
                  break

          if not cik:
              print(f"[ERROR] {ticker} のCIKが見つかりませんでした")
              write_result({"ticker": ticker, "status": "not_found"})
              exit(1)

          print(f"[OK] {ticker}: CIK={cik}, Name={name}")

          # ── 新規行を追加（既存のfieldnamesに合わせて空埋め） ──
          new_row = {fn: "" for fn in fieldnames}
          new_row["ticker"] = ticker
          new_row["cik"]    = cik
          new_row["name"]   = name
          rows.append(new_row)
          rows.sort(key=lambda r: r.get("ticker", ""))

          # ── CSVを書き戻す（BOMなしUTF-8・元ヘッダー維持） ──
          os.makedirs(os.path.dirname(csv_path), exist_ok=True)
          with open(csv_path, "w", newline='', encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=fieldnames, extrasaction='ignore')
              writer.writeheader()
              writer.writerows(rows)

          print(f"[DONE] cik_lookup.csv を更新しました（全{len(rows)}行）")

          write_result({
              "ticker": ticker,
              "cik": cik,
              "name": name,
              "status": "ok"
          })
          EOF
        env:
          TICKER: ${{ github.event.inputs.ticker }}
          SEC_USER_AGENT_EMAIL: ${{ secrets.SEC_USER_AGENT_EMAIL }}

      - name: Commit updated files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add config/cik_lookup.csv 2>/dev/null || true
          git add config/cik_lookup_result.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "[INFO] コミットする変更はありません"
          else
            git commit -m "chore: CIK lookup for ${{ github.event.inputs.ticker }}"
            git push
            echo "[DONE] コミット完了"
          fi
