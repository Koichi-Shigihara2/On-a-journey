name: TANUKI CIK Lookup

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'ティッカーシンボル（例: META）'
        required: true
        type: string

jobs:
  cik-lookup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: kaihatsu

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Lookup CIK from SEC
        id: lookup
        run: |
          python - <<'EOF'
          import os
          import csv
          import json
          import requests

          ticker = os.environ.get("TICKER", "").strip().upper()
          csv_path = "config/cik_lookup.csv"
          result_path = "config/cik_lookup_result.json"

          def write_result(data: dict):
              """result.jsonを必ず書き込む（commitステップが参照）"""
              os.makedirs(os.path.dirname(result_path), exist_ok=True)
              with open(result_path, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          # ── 既存CSVを読み込む ──
          rows = []
          existing_tickers = set()
          try:
              with open(csv_path, newline='', encoding='utf-8') as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      rows.append(row)
                      existing_tickers.add(row['ticker'].upper())
          except FileNotFoundError:
              pass

          if ticker in existing_tickers:
              print(f"[SKIP] {ticker} は既にcik_lookup.csvに存在します")
              write_result({"ticker": ticker, "status": "already_exists"})
              exit(0)

          # ── SEC company_tickers.json から CIK を取得 ──
          print(f"[INFO] SEC APIからCIKを取得中: {ticker}")
          headers = {
              "User-Agent": "Koichi-Shigihara2 On-a-journey tanuki-valuation",
              "Accept": "application/json"
          }

          try:
              res = requests.get(
                  "https://www.sec.gov/files/company_tickers.json",
                  headers=headers,
                  timeout=30
              )
              res.raise_for_status()
              data = res.json()
          except Exception as e:
              print(f"[ERROR] SEC API取得失敗: {e}")
              write_result({"ticker": ticker, "status": "api_error", "error": str(e)})
              exit(1)

          cik = None
          name = None
          for entry in data.values():
              if entry.get("ticker", "").upper() == ticker:
                  cik = str(entry["cik_str"]).zfill(10)
                  name = entry.get("title", "")
                  break

          if not cik:
              print(f"[ERROR] {ticker} のCIKが見つかりませんでした")
              write_result({"ticker": ticker, "status": "not_found"})
              exit(1)

          print(f"[OK] {ticker}: CIK={cik}, Name={name}")

          # ── CSVに追記 ──
          rows.append({"ticker": ticker, "cik": cik, "name": name})
          rows.sort(key=lambda r: r["ticker"])

          os.makedirs(os.path.dirname(csv_path), exist_ok=True)
          with open(csv_path, "w", newline='', encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=["ticker", "cik", "name"])
              writer.writeheader()
              writer.writerows(rows)

          # ── result.jsonに成功を記録 ──
          write_result({
              "ticker": ticker,
              "cik": cik,
              "name": name,
              "status": "ok"
          })

          print(f"[DONE] cik_lookup.csv を更新しました")
          EOF
        env:
          TICKER: ${{ github.event.inputs.ticker }}

      # exitコード0/1に関わらず常にコミットを試みる
      - name: Commit updated files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 存在するファイルのみ add（存在しないファイルはエラーを無視）
          git add config/cik_lookup.csv 2>/dev/null || true
          git add config/cik_lookup_result.json 2>/dev/null || true

          # 差分があればコミット、なければスキップ
          if git diff --staged --quiet; then
            echo "[INFO] コミットする変更はありません"
          else
            git commit -m "chore: CIK lookup for ${{ github.event.inputs.ticker }}"
            git push
            echo "[DONE] コミット完了"
          fi
