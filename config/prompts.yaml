# config/prompts.yaml
# AI分析プロンプト設定
adjustment_analysis: |
  あなたは財務分析のエキスパートです。以下の調整項目リストを分析し、健全性とコメントを返してください。
  ティッカー: {ticker}
  期: {fiscal_period}
  GAAP EPS: {gaap_eps}
  Adjusted EPS: {adjusted_eps}
  調整項目: {adjustments_json}
  
  以下のJSON形式で返してください：
  {{
    "health": "Excellent/Good/Caution/Warning/Error",
    "comment": "分析コメント（日本語）",
    "sources": [
      {{
        "item": "項目名",
        "snippet": "引用テキスト（調整の根拠・性質の説明）",
        "confidence": 0.0から1.0の数値（この調整が真に一過性・非経常的であるという確信度。1.0=完全に一過性、0.0=恒常的コスト）
      }}
    ]
  }}
  
  confidenceの判断基準：
  - 1.0: 明らかに一過性（訴訟和解、災害損失、IPO費用など）
  - 0.8: ほぼ一過性（リストラ費用、M&A関連費用など）
  - 0.5: 判断が難しい（マイルストーン型R&D、一部のSBCなど）
  - 0.2: 恒常的な可能性が高い（毎期発生するSBC、無形資産償却など）
  - 0.0: 完全に恒常的（コア事業に関わる費用）
